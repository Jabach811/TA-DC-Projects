<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DC Onboarding Tracker — Manager Workspace</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface-2:#f7f8fa;
  --border:#dde1e9;--border-strong:#bfc5d0;
  --text-1:#1a2233;--text-2:#4a5568;--text-3:#8a93a6;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-bd:rgba(37,99,235,.2);
  --success:#166534;--success-bg:#f0fdf4;--success-bd:rgba(22,101,52,.2);
  --warn:#92400e;--warn-bg:#fffbeb;--warn-bd:rgba(146,64,14,.2);
  --danger:#991b1b;--danger-bg:#fff1f1;--danger-bd:rgba(153,27,27,.2);
  --muted:#6b7280;--muted-bg:#f3f4f6;--muted-bd:rgba(107,114,128,.18);
  --sidebar:#ffffff;--sidebar-text:#1a2233;--sidebar-muted:#8a96a8;
  --sidebar-hover:rgba(0,0,0,.04);--sidebar-active:rgba(37,99,235,.08);
  --sidebar-border:rgba(0,0,0,.08);
  --r:10px;--r-lg:16px;
  --shadow:0 2px 6px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text-1);font-size:15px;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────── */
#sidebar{width:272px;min-width:272px;background:var(--sidebar);display:flex;flex-direction:column;height:100vh;border-right:1px solid rgba(0,0,0,.1)}
#sidebar-header{padding:16px 14px 0;border-bottom:1px solid var(--sidebar-border)}
.sidebar-brand{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.sidebar-brand-icon{width:36px;height:36px;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
.sidebar-brand-text{flex:1;min-width:0}
.sidebar-brand-name{font-size:14px;font-weight:600;color:var(--sidebar-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-brand-sub{font-size:11px;color:var(--sidebar-muted);margin-top:2px}
.sidebar-search{position:relative;margin-bottom:10px}
.sidebar-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aab0bc;font-size:12px;pointer-events:none}
.sidebar-search input{width:100%;background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.09);border-radius:var(--r);padding:9px 10px 9px 32px;color:var(--sidebar-text);font:inherit;font-size:13px;outline:none}
.sidebar-search input::placeholder{color:var(--sidebar-muted)}
.sidebar-search input:focus{border-color:rgba(37,99,235,.45);background:rgba(37,99,235,.04)}
.sidebar-filters{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:12px}
.filter-chip{padding:5px 11px;border-radius:20px;background:rgba(0,0,0,.05);border:1px solid rgba(0,0,0,.09);color:var(--sidebar-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.filter-chip:hover{background:rgba(0,0,0,.08);color:var(--sidebar-text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
#sidebar-list{flex:1;overflow-y:auto;padding:10px}
#sidebar-list::-webkit-scrollbar{width:4px}
#sidebar-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
.hire-card{border-radius:var(--r);padding:12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:background .12s}
.hire-card:hover{background:var(--sidebar-hover)}
.hire-card.active{background:var(--sidebar-active);border-color:rgba(37,99,235,.25)}
.hire-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.hire-avatar{width:38px;height:38px;background:var(--accent-bg);border:1px solid var(--accent-bd);color:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.02em}
.hire-card-info{flex:1;min-width:0}
.hire-card-name{font-size:13px;font-weight:600;color:var(--sidebar-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hire-card-meta{font-size:11px;color:var(--sidebar-muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hire-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-blocked{background:#ef4444}.dot-complete{background:#22c55e}.dot-in-progress{background:#3b82f6}.dot-not-started{background:#cbd5e1}
.hire-card-footer{display:flex;align-items:center;justify-content:space-between}
.hire-card-pct{font-size:11px;font-weight:600;color:var(--sidebar-muted);display:flex;align-items:center;gap:4px}
.hire-card-pct .alert-icon{color:#f87171;font-size:10px}
.hire-track{height:4px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden;margin-top:8px}
.hire-track-fill{height:100%;border-radius:3px;transition:width .4s}
.hire-empty{padding:24px;text-align:center;color:var(--sidebar-muted);font-size:13px;line-height:1.7}
#sidebar-footer{padding:12px 10px;border-top:1px solid var(--sidebar-border)}
.sidebar-add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font:600 14px/1 system-ui;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.sidebar-add-btn:hover{background:#1d4ed8;box-shadow:0 4px 14px rgba(37,99,235,.35)}

/* ── MAIN ─────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
#topbar-title{font-size:17px;font-weight:600;flex:1}
#topbar-actions{display:flex;align-items:center;gap:10px}
.view-tabs{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.view-tab{padding:7px 16px;border:none;border-radius:8px;background:transparent;font:500 13px/1 system-ui;color:var(--text-2);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px}
.view-tab i{font-size:12px}
.view-tab.active{background:var(--surface);color:var(--text-1);box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font:500 13px/1 system-ui;cursor:pointer;transition:all .12s;border:1px solid transparent}
.btn i{font-size:12px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:var(--surface);color:var(--text-2);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bd)}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:6px 12px;font-size:12px}
#content{flex:1;overflow:hidden}
#detail-view,#overview-view{height:100%;overflow-y:auto;padding:24px}
#detail-view{display:block}
#overview-view{display:none}
#detail-view::-webkit-scrollbar,#overview-view::-webkit-scrollbar{width:5px}
#detail-view::-webkit-scrollbar-thumb,#overview-view::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}

/* ── BADGES ─────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent;letter-spacing:.01em;white-space:nowrap}
.badge i{font-size:10px}
.s-not-started{background:var(--muted-bg);color:var(--muted);border-color:var(--muted-bd)}
.s-in-progress{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd)}
.s-done{background:var(--success-bg);color:var(--success);border-color:var(--success-bd)}
.s-blocked{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bd)}
.s-not-applicable{background:var(--muted-bg);color:var(--text-3);border-color:transparent}
.badge-phase{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.tag-high{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bd)}
.tag-medium{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-bd)}
.tag-low{background:var(--muted-bg);color:var(--muted)}
.tag-category{background:var(--surface-2);color:var(--text-2);border-color:var(--border)}
.tag-owner{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}

/* ── EMPTY STATE ─────────────────────────────────────── */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-3);text-align:center;gap:12px}
.es-icon{width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-3)}
.es-text{font-size:15px;max-width:320px;line-height:1.7;color:var(--text-2)}

/* ── HIRE DETAIL ─────────────────────────────────────── */
.hire-detail-stack{display:flex;flex-direction:column;gap:16px}
.detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--shadow)}
.detail-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.detail-hero-id{display:flex;align-items:center;gap:14px}
.detail-avatar{width:54px;height:54px;background:var(--accent-bg);border:1.5px solid var(--accent-bd);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--accent);flex-shrink:0;letter-spacing:.02em}
.detail-name{font-size:22px;font-weight:700;color:var(--text-1);letter-spacing:-.3px}
.detail-meta{font-size:13px;color:var(--text-2);margin-top:4px;line-height:1.7}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.detail-stat{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;color:var(--text-1);line-height:1}
.stat-value.danger{color:var(--danger)}
.stat-sub{font-size:12px;color:var(--text-2);margin-top:5px;line-height:1.5}
.stat-actions{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.stat-action-item{font-size:12px;color:var(--text-2);padding:6px 10px;background:var(--bg);border-radius:8px;border-left:3px solid var(--accent)}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

/* ── DETAIL GRID ─────────────────────────────────────── */
.detail-grid{display:grid;grid-template-columns:1fr 290px;gap:16px}
.section-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-panel:last-child{margin-bottom:0}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .12s}
.section-header:hover{background:var(--surface-2)}
.section.collapsed .section-header{border-bottom:none}
.section:not(.collapsed) .section-header{border-bottom:1px solid var(--border)}
.section-header-left{flex:1;min-width:0}
.section-title{font-size:14px;font-weight:600}
.section-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.section-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.section-pct-bar{width:80px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.section-pct-fill{height:100%;border-radius:3px}
.section-pct-label{font-size:11px;font-weight:600;color:var(--text-3);min-width:30px;text-align:right}
.section-chevron{font-size:11px;color:var(--text-3)}
.section.collapsed .section-chevron{transform:rotate(-90deg)}
.section-body{}
.section.collapsed .section-body{display:none}

/* ── TASKS ───────────────────────────────────────────── */
.task-row{padding:16px 18px;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-row.task-blocked{background:#fff5f5;border-left:4px solid var(--danger);padding-left:14px}
.task-main-row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start}
.task-check{width:30px;height:30px;border-radius:8px;border:2px solid var(--border-strong);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;font-size:12px;color:transparent;margin-top:1px}
.task-check.done{background:var(--success);border-color:var(--success);color:#fff}
.task-check.in-progress{background:var(--warn-bg);border-color:var(--warn-bd);color:var(--warn)}
.task-check.blocked{background:var(--danger-bg);border-color:var(--danger-bd);color:var(--danger)}
.task-check.not-applicable{background:var(--muted-bg);border-color:var(--muted-bd);color:var(--text-3)}
.task-check.not-started{color:var(--text-3)}
.task-check:hover{border-color:var(--accent)}
.task-title{font-size:14px;font-weight:600;margin-bottom:4px}
.task-desc{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:9px}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.task-controls{display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex-shrink:0}
.task-select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface);color:var(--text-1);outline:none;cursor:pointer;min-width:130px}
.task-select:focus{border-color:var(--accent)}
.task-email-btn{padding:7px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text-2);cursor:pointer;font:500 12px/1 system-ui;display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap}
.task-email-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
.task-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding-top:12px;border-top:1px solid var(--border)}
.task-field label{display:block;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.task-input,.task-textarea,.task-field .task-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface);color:var(--text-1);outline:none}
.task-input:focus,.task-textarea:focus,.task-field .task-select:focus{border-color:var(--accent)}
.task-textarea{min-height:64px;resize:vertical;line-height:1.6}
.task-updated{font-size:11px;color:var(--text-3);margin-top:5px;display:block}

/* ── RIGHT PANELS ────────────────────────────────────── */
.right-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.right-panel:last-child{margin-bottom:0}
.right-panel-title{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.right-panel-title i{color:var(--text-3);font-size:12px}
.form-field{margin-bottom:12px}
.form-field:last-child{margin-bottom:0}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface);color:var(--text-1);outline:none;line-height:1.6}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{min-height:72px;resize:vertical}
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.phase-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.phase-box-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.phase-box-value{font-size:18px;font-weight:700;color:var(--text-1);line-height:1}
.phase-box-bar{height:4px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.phase-box-fill{height:100%;border-radius:3px}
.updated-note{font-size:11px;color:var(--text-3);margin-top:10px}

/* ── DASHBOARD ───────────────────────────────────────── */
.ov-wrap{display:flex;flex-direction:column;gap:16px}

/* KPI Cards */
.ov-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ov-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;display:flex;align-items:flex-start;gap:16px;box-shadow:var(--shadow)}
.ov-kpi-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kpi-total .ov-kpi-icon{background:var(--accent-bg);color:var(--accent)}
.kpi-blocked .ov-kpi-icon{background:var(--danger-bg);color:var(--danger)}
.kpi-soon .ov-kpi-icon{background:var(--warn-bg);color:var(--warn)}
.kpi-done .ov-kpi-icon{background:var(--success-bg);color:var(--success)}
.ov-kpi-body{flex:1;min-width:0}
.ov-kpi-num{font-size:36px;font-weight:700;color:var(--text-1);line-height:1;margin-bottom:4px}
.kpi-blocked .ov-kpi-num{color:var(--danger)}
.kpi-soon .ov-kpi-num{color:var(--warn)}
.kpi-done .ov-kpi-num{color:var(--success)}
.ov-kpi-label{font-size:14px;font-weight:600;color:var(--text-1)}
.ov-kpi-sub{font-size:12px;color:var(--text-3);margin-top:3px}

/* Pipeline */
.ov-pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--shadow)}
.ov-card-title{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.ov-card-title i{color:var(--text-3);font-size:13px}
.ov-pipeline{display:grid;grid-template-columns:repeat(6,1fr);gap:16px}
.ov-pipe-step{display:flex;flex-direction:column;gap:7px}
.ov-pipe-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.ov-pipe-count{font-size:28px;font-weight:700;color:var(--text-1);line-height:1}
.ov-pipe-bar-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.ov-pipe-bar{height:100%;border-radius:3px;transition:width .4s}
.ov-pipe-sub{font-size:11px;color:var(--text-3)}

/* Roster + Side */
.ov-main{display:grid;grid-template-columns:1fr 284px;gap:16px;align-items:start}
.ov-roster-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 24px;box-shadow:var(--shadow)}
.ov-roster-row{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;padding:11px 8px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.ov-roster-row:not(:last-child){border-bottom:1px solid var(--border)}
.ov-roster-row:hover{background:var(--surface-2)}
.ov-roster-avatar{width:40px;height:40px;border-radius:10px;background:var(--accent-bg);border:1px solid var(--accent-bd);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ov-roster-info{min-width:0}
.ov-roster-name{font-size:14px;font-weight:600;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-roster-meta{font-size:12px;color:var(--text-3);margin-top:2px}
.ov-roster-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.ov-roster-progress{width:120px;flex-shrink:0}
.ov-roster-pct{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-align:right}
.ov-roster-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.ov-roster-fill{height:100%;border-radius:3px}
.ov-empty{font-size:13px;color:var(--text-3);padding:10px 4px;line-height:1.7}

/* Side panels */
.ov-side{display:flex;flex-direction:column;gap:14px}
.ov-side-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow)}
.ov-side-title{font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.ov-side-title i{font-size:12px;color:var(--text-3)}
.ov-side-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ov-side-item:last-child{border-bottom:none;padding-bottom:0}
.ov-side-item:first-child{padding-top:0}
.ov-side-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ov-side-item-name{font-size:13px;font-weight:600;color:var(--text-1)}
.ov-side-item-sub{font-size:12px;color:var(--text-3);margin-top:3px;line-height:1.6}

/* ── MODALS ──────────────────────────────────────────── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:24px;z-index:100}
.modal.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);width:min(600px,100%);max-height:90vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.18)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:600}
.modal-sub{font-size:13px;color:var(--text-2);margin-top:3px}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.modal-input,.modal-select,.modal-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:14px;background:var(--surface);color:var(--text-1);outline:none}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--accent)}
.modal-textarea{min-height:88px;resize:vertical;line-height:1.6}
.email-field{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:13px}
.email-field strong{color:var(--text-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.email-textarea{width:100%;min-height:210px;padding:12px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:var(--surface);color:var(--text-1);resize:vertical;outline:none;line-height:1.7}
.email-textarea:focus{border-color:var(--accent)}

@media(max-width:1100px){.detail-grid{grid-template-columns:1fr}.detail-stats{grid-template-columns:repeat(2,1fr)}.task-fields{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.ov-kpis{grid-template-columns:repeat(2,1fr)}.ov-main{grid-template-columns:1fr}.ov-pipeline{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){#sidebar{width:100%;min-width:0;height:auto}.task-fields{grid-template-columns:1fr}.modal-fields{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

    </div>

      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('attention',this)">Attention</button>
      <button class="filter-chip" onclick="setFilter('starting-soon',this)">Starting</button>
      <button class="filter-chip" onclick="setFilter('blocked',this)">Blocked</button>
      <button class="filter-chip" onclick="setFilter('complete',this)">Complete</button>
    </div>
  </div>
  <div id="sidebar-list"></div>
  <div id="sidebar-footer">
    <button class="sidebar-add-btn" onclick="openAddModal()">
      <i class="fa-solid fa-plus"></i> Add New Hire
    </button>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <div id="topbar-title">Manager Workspace</div>
    <div id="topbar-actions">
      <div class="view-tabs">
        <button class="view-tab active" id="tab-detail" onclick="switchView('detail')"><i class="fa-solid fa-user-clock"></i> Hire Detail</button>
        <button class="view-tab" id="tab-overview" onclick="switchView('overview')"><i class="fa-solid fa-chart-simple"></i> Dashboard</button>
      </div>
      <button class="btn btn-ghost" onclick="exportTracker()"><i class="fa-solid fa-download"></i> Export</button>
    </div>
  </div>
  <div id="content">
    <div id="detail-view">
      <div id="empty-state">
        <div class="es-icon"><i class="fa-solid fa-user-clock"></i></div>
        <div class="es-text">Select a hire from the sidebar to manage phase progress, notes, blockers, and follow-up emails.</div>
      </div>
      <div id="hire-detail" style="display:none"></div>
    </div>
    <div id="overview-view"></div>
  </div>
</div>

<!-- ADD HIRE MODAL -->
<div class="modal" id="add-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Create Onboarding Profile</div>
      <div class="modal-sub">Manager-owned tracking for this hire&rsquo;s onboarding progress.</div>
    </div>
    <div class="modal-body">
      <div class="modal-fields">
        <div class="modal-field"><label>First name</label><input class="modal-input" id="f-first"></div>
        <div class="modal-field"><label>Last name</label><input class="modal-input" id="f-last"></div>
        <div class="modal-field"><label>Hire type</label><select class="modal-select" id="f-hire-type"><option value="external">External hire</option><option value="internal">Internal transfer</option></select></div>
      </div>
      <div class="modal-fields">
        <div class="modal-field"><label>Department</label><input class="modal-input" id="f-dept" value="Data Consultant"></div>
        <div class="modal-field"><label>Manager</label><input class="modal-input" id="f-manager"></div>
        <div class="modal-field"><label>Preset</label><select class="modal-select" id="f-preset"><option value="dc-core">Data Consultant</option></select></div>
      </div>
      <div class="modal-fields">
        <div class="modal-field"><label>Start date</label><input class="modal-input" id="f-start" type="date"></div>
        <div class="modal-field"><label>Employee ID</label><input class="modal-input" id="f-eid"></div>
        <div class="modal-field"><label>Email</label><input class="modal-input" id="f-email" type="email"></div>
      </div>
      <div class="modal-field"><label>Manager summary</label><textarea class="modal-textarea" id="f-summary" placeholder="What should the manager keep top of mind for this hire?"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addHire()"><i class="fa-solid fa-check"></i> Create Profile</button>
    </div>
  </div>
</div>

<!-- EMAIL MODAL -->
<div class="modal" id="email-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Draft Email</div>
      <div class="modal-sub" id="email-kind"></div>
    </div>
    <div class="modal-body">
      <div class="email-field"><strong>To</strong><span id="email-to"></span></div>
      <div class="email-field"><strong>Subject</strong><span id="email-subject"></span></div>
      <textarea class="email-textarea" id="email-body"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="copyEmailDraft()"><i class="fa-solid fa-copy"></i> Copy Draft</button>
      <button class="btn btn-primary" id="email-mailto"><i class="fa-solid fa-envelope"></i> Open in Mail App</button>
      <button class="btn btn-ghost" onclick="closeModal('email-modal')">Close</button>
    </div>
  </div>
</div>

'blocked-followup':{label:'Blocked item follow-up',subject:d=>`Blocked onboarding item: ${d.task} - ${d.name}`,body:d=>`Hi team,\n\nThis onboarding item is currently blocked and needs follow-up:\n\nTask: ${d.task}\nEmployee: ${d.name}\nDepartment: ${d.department}\nCurrent phase: ${d.phase}\nManager note: ${d.note||'No note entered yet.'}\n\nPlease send the latest update or next step so this does not slip.\n\nThanks,\n${d.manager}`}};

let state={version:APP_VERSION,hires:[],selectedHireId:null,filter:'all',view:'detail'},currentDraft=null;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const phaseLabel=id=>(PHASES.find(p=>p[0]===id)||PHASES[0])[1];
const initials=h=>`${h.first?.[0]||''}${h.last?.[0]||''}`.toUpperCase()||'NA';
const fmtDate=v=>v?new Date(v+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'Not set';
const fmtDT=v=>v?new Date(v).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'No updates yet';
const now=()=>new Date().toISOString();
const presetItems=id=>PRESETS[id||'dc-core'].sections.flatMap(s=>s.items.map(i=>({id:i[0],title:i[1],desc:i[2],owner:i[3],ownerLabel:i[4],category:i[5],phase:i[6],priority:i[7],emailTemplateKey:i[8],sectionId:s.id,sectionTitle:s.title})));
const makeTask=i=>({status:'not-started',note:'',updatedAt:'',ownerOverride:'',skippedReason:'',targetPhase:i.phase});

// Icon + badge helpers
const PHASE_ICONS={prestart:'fa-hourglass-start',day1:'fa-sun',week1:'fa-calendar-week',week2:'fa-calendar-days',month1:'fa-calendar-check',complete:'fa-graduation-cap'};
const STATUS_ICONS={'not-started':'fa-circle','in-progress':'fa-circle-half-stroke',done:'fa-circle-check',blocked:'fa-triangle-exclamation','not-applicable':'fa-ban'};
const PRIORITY_ICONS={high:'fa-arrow-up',medium:'fa-minus',low:'fa-arrow-down'};
const phaseBadge=id=>`<span class="badge badge-phase"><i class="fa-solid ${PHASE_ICONS[id]||'fa-calendar'}"></i> ${phaseLabel(id)}</span>`;
const statusBadge=s=>`<span class="badge ${statusClass(s)}"><i class="fa-solid ${STATUS_ICONS[s]||'fa-circle'}"></i> ${statusLabel(s)}</span>`;
const priorityBadge=p=>`<span class="badge tag-${p}"><i class="fa-solid ${PRIORITY_ICONS[p]||'fa-minus'}"></i> ${p}</span>`;
const pcolor=p=>p>=100?'var(--success)':p>=60?'var(--accent)':p>=30?'var(--warn)':'var(--muted)';

function createHire(d){const checklist={};presetItems(d.departmentPreset).forEach(i=>checklist[i.id]=makeTask(i));return{id:`hire-${Date.now()}-${Math.random().toString(36).slice(2)}`,first:d.first||'',last:d.last||'',dept:d.dept||'Data Consultant',manager:d.manager||'',email:d.email||'',eid:d.eid||'',startDate:d.startDate||'',hireType:d.hireType||'external',phase:'prestart',managerSummary:d.managerSummary||'',managerNotes:d.managerNotes||'',departmentPreset:d.departmentPreset||'dc-core',lastUpdatedAt:now(),createdAt:now(),checklist,colorIdx:typeof d.colorIdx==='number'?d.colorIdx:Math.floor(Math.random()*COLORS.length)}}
function migrateHire(h){const m=createHire({...h,managerSummary:h.managerSummary||h.notes||'',departmentPreset:h.departmentPreset||'dc-core'});m.id=h.id||m.id;m.createdAt=h.createdAt||m.createdAt;m.lastUpdatedAt=h.lastUpdatedAt||m.lastUpdatedAt;m.managerNotes=h.managerNotes||h.notes||'';presetItems(m.departmentPreset).forEach(i=>{const e=h.checklist?.[i.id];if(typeof e==='string')m.checklist[i.id]={...makeTask(i),status:e==='pending'?'not-started':e};else if(e&&typeof e==='object')m.checklist[i.id]={...makeTask(i),...e,status:e.status==='pending'?'not-started':(e.status||'not-started'),targetPhase:e.targetPhase||i.phase};});return m}
const tstate=(h,id)=>h.checklist[id],blockedCount=h=>presetItems(h.departmentPreset).filter(i=>tstate(h,i.id)?.status==='blocked').length;
function progress(h){const items=presetItems(h.departmentPreset).filter(i=>tstate(h,i.id)?.status!=='not-applicable');const done=items.filter(i=>tstate(h,i.id)?.status==='done').length;return{done,total:items.length,pct:items.length?Math.round(done/items.length*100):100}}
function currentPhase(h){for(const [id] of PHASES.slice(0,-1)){const items=presetItems(h.departmentPreset).filter(i=>i.phase===id&&tstate(h,i.id)?.status!=='not-applicable');if(items.length&&!items.every(i=>tstate(h,i.id)?.status==='done'))return id}return'complete'}
function overall(h){const p=progress(h);if(blockedCount(h))return'blocked';if(p.total&&p.done===p.total)return'complete';return presetItems(h.departmentPreset).some(i=>['done','in-progress'].includes(tstate(h,i.id)?.status))?'in-progress':'not-started'}
const statusClass=s=>({'not-started':'s-not-started','in-progress':'s-in-progress','blocked':'s-blocked','done':'s-done','complete':'s-done','not-applicable':'s-not-applicable'})[s]||'s-not-started';
const statusLabel=s=>({'not-started':'Not Started','in-progress':'In Progress','blocked':'Blocked','done':'Complete','complete':'Complete','not-applicable':'N/A'})[s]||'Not Started';
function startWindow(h){if(!h.startDate)return'No start date';const today=new Date(),start=new Date(h.startDate+'T12:00:00'),d=Math.round((start-new Date(today.getFullYear(),today.getMonth(),today.getDate(),12))/86400000);if(d>7)return'Future start';if(d>=1)return'Starting soon';if(d===0)return'Starts today';return'In progress'}
function save(){state.hires.forEach(h=>{h.phase=currentPhase(h)});localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function load(){const raw=localStorage.getItem(STORAGE_KEY);if(raw)try{const p=JSON.parse(raw);state={version:APP_VERSION,hires:(p.hires||[]).map(migrateHire),selectedHireId:p.selectedHireId||null,filter:p.filter||'all',view:p.view||'detail'}}catch(e){}; if(!state.hires.length)seed();if(!state.selectedHireId&&state.hires.length)state.selectedHireId=state.hires[0].id}
function touch(h){h.lastUpdatedAt=now()}
function setStatusById(h,id,status,note){if(!h.checklist[id])return;h.checklist[id].status=status;if(typeof note==='string')h.checklist[id].note=note;h.checklist[id].updatedAt=now();touch(h)}
function score(h,i,cp){const s=tstate(h,i.id);return(s.status==='blocked'?0:1)+((s.targetPhase||i.phase)===cp?0:3)+(i.priority==='high'?0:i.priority==='medium'?2:4)}
function nextActions(h){const cp=currentPhase(h);return presetItems(h.departmentPreset).filter(i=>!['done','not-applicable'].includes(tstate(h,i.id)?.status)).sort((a,b)=>score(h,a,cp)-score(h,b,cp)).slice(0,3)}

function renderSidebar(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const list=document.getElementById('sidebar-list');
  let hires=state.hires.filter(h=>{
    const txt=`${h.first} ${h.last} ${h.dept} ${h.manager} ${phaseLabel(currentPhase(h))}`.toLowerCase();
    if(q&&!txt.includes(q))return false;
    const o=overall(h),sw=startWindow(h);
    if(state.filter==='attention')return blockedCount(h)>0||progress(h).pct<70;
    if(state.filter==='starting-soon')return sw==='Starting soon'||sw==='Starts today';
    if(state.filter==='blocked')return o==='blocked';
    if(state.filter==='complete')return o==='complete';
    return true;
  }).sort((a,b)=>blockedCount(b)-blockedCount(a)||new Date(b.lastUpdatedAt)-new Date(a.lastUpdatedAt));
  const dotClass=o=>o==='blocked'?'dot-blocked':o==='complete'?'dot-complete':o==='in-progress'?'dot-in-progress':'dot-not-started';
  list.innerHTML=hires.length?hires.map(h=>{
    const p=progress(h),o=overall(h),bl=blockedCount(h);
    return `<div class="hire-card ${h.id===state.selectedHireId?'active':''}" onclick="selectHire('${h.id}')">

    </div>`;
  }).join(''):'<div class="hire-empty">No hires match current filters.</div>';
}

}

function renderSection(h,s,cp){
  const items=s.items.map(i=>({id:i[0],title:i[1],desc:i[2],owner:i[3],ownerLabel:i[4],category:i[5],phase:i[6],priority:i[7],emailTemplateKey:i[8]})).sort((a,b)=>score(h,a,cp)-score(h,b,cp));
  const active=items.filter(i=>tstate(h,i.id).status!=='not-applicable'),done=active.filter(i=>tstate(h,i.id).status==='done').length,pct=active.length?Math.round(done/active.length*100):100;

        <div class="ov-kpi-body"><div class="ov-kpi-num">${complete.length}</div><div class="ov-kpi-label">Complete</div><div class="ov-kpi-sub">All active tasks done</div></div>
      </div>
    </div>

    <div class="ov-pipeline-card">
      <div class="ov-card-title"><i class="fa-solid fa-arrow-right-long"></i> Phase Pipeline</div>
      <div class="ov-pipeline">${pipelineHTML}</div>
    </div>

    <div class="ov-main">
      <div class="ov-roster-card">
        <div class="ov-card-title"><i class="fa-solid fa-list-check"></i> All Hires</div>
        ${rosterHTML}
      </div>
      <div class="ov-side">
        <div class="ov-side-card">
          <div class="ov-side-title"><i class="fa-solid fa-triangle-exclamation"></i> Needs Attention</div>
          ${attentionHTML}
        </div>
        <div class="ov-side-card">
          <div class="ov-side-title"><i class="fa-solid fa-rocket"></i> Starting Soon</div>
          ${soonHTML}
        </div>
      </div>
    </div>

  </div>`;
}

function selectHire(id){state.selectedHireId=id;save();renderSidebar();renderDetail()}
function switchView(v){
  state.view=v;const isDetail=v==='detail';
  document.getElementById('tab-detail').classList.toggle('active',isDetail);
  document.getElementById('tab-overview').classList.toggle('active',!isDetail);
  document.getElementById('detail-view').style.display=isDetail?'block':'none';
  document.getElementById('overview-view').style.display=isDetail?'none':'block';
  if(!isDetail)renderOverview();save();
}
function setFilter(f,el){state.filter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderSidebar();save()}
function toggleSection(id){document.getElementById(`section-${id}`)?.classList.toggle('collapsed')}
function cycleStatus(hid,id){const h=state.hires.find(x=>x.id===hid),order=['not-started','in-progress','done','blocked','not-applicable'];if(!h)return;const s=tstate(h,id),idx=order.indexOf(s.status);s.status=order[(idx+1)%order.length];if(s.status==='not-applicable'&&!s.skippedReason)s.skippedReason='Marked not applicable by manager.';s.updatedAt=now();touch(h);save();renderSidebar();renderDetail();if(state.view==='overview')renderOverview()}
function setTaskStatus(hid,id,val){const h=state.hires.find(x=>x.id===hid);if(!h)return;const s=tstate(h,id);s.status=val;if(val==='not-applicable'&&!s.skippedReason)s.skippedReason='Marked not applicable by manager.';s.updatedAt=now();touch(h);save();renderSidebar();renderDetail();if(state.view==='overview')renderOverview()}
function updateTaskField(hid,id,field,val){const h=state.hires.find(x=>x.id===hid);if(!h)return;tstate(h,id)[field]=val;if(field==='note'&&tstate(h,id).status==='not-applicable')tstate(h,id).skippedReason=val;tstate(h,id).updatedAt=now();touch(h);save();renderSidebar();if(state.view==='overview')renderOverview()}
function saveHireField(hid,field,val){const h=state.hires.find(x=>x.id===hid);if(!h)return;h[field]=val;touch(h);save();renderSidebar();if(state.view==='overview')renderOverview()}
function openAddModal(){document.getElementById('f-start').value=new Date().toISOString().split('T')[0];document.getElementById('add-modal').classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function addHire(){const first=document.getElementById('f-first').value.trim(),last=document.getElementById('f-last').value.trim();if(!first||!last){alert('Please enter a first and last name.');return}const h=createHire({first,last,dept:document.getElementById('f-dept').value.trim()||'Data Consultant',manager:document.getElementById('f-manager').value.trim(),email:document.getElementById('f-email').value.trim(),eid:document.getElementById('f-eid').value.trim(),startDate:document.getElementById('f-start').value,hireType:document.getElementById('f-hire-type').value,managerSummary:document.getElementById('f-summary').value.trim(),departmentPreset:document.getElementById('f-preset').value});h.colorIdx=state.hires.length%COLORS.length;state.hires.push(h);state.selectedHireId=h.id;save();closeModal('add-modal');['f-first','f-last','f-manager','f-email','f-eid','f-summary'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-hire-type').value='external';document.getElementById('f-dept').value='Data Consultant';renderSidebar();renderDetail();if(state.view==='overview')renderOverview()}
function removeHire(id){if(!confirm('Remove this onboarding profile? This cannot be undone.'))return;state.hires=state.hires.filter(h=>h.id!==id);if(state.selectedHireId===id)state.selectedHireId=state.hires[0]?.id||null;save();renderSidebar();renderDetail();if(state.view==='overview')renderOverview()}

function draft(h,item){const key=item?.emailTemplateKey||'welcome',tpl=EMAILS[key]||EMAILS.welcome,d={name:`${h.first} ${h.last}`.trim(),first:h.first||'there',manager:h.manager||'Manager',department:h.dept||'Data Consultant',startDate:fmtDate(h.startDate),phase:phaseLabel(currentPhase(h)),meetingLink:'[Insert Teams meeting link]',task:item?item.title:'Onboarding follow-up',taskPhase:item?phaseLabel(tstate(h,item.id).targetPhase||item.phase):phaseLabel(currentPhase(h)),note:item?(tstate(h,item.id).note||tstate(h,item.id).skippedReason||''):''};return{to:h.email||'[Employee email]',subject:tpl.subject(d),body:tpl.body(d),label:tpl.label}}
function openEmailModal(hid,itemId){const h=state.hires.find(x=>x.id===hid);if(!h)return;const item=presetItems(h.departmentPreset).find(i=>i.id===itemId);currentDraft=draft(h,item);document.getElementById('email-kind').textContent=currentDraft.label;document.getElementById('email-to').textContent=currentDraft.to;document.getElementById('email-subject').textContent=currentDraft.subject;document.getElementById('email-body').value=currentDraft.body;document.getElementById('email-mailto').onclick=()=>{const body=document.getElementById('email-body').value,href=`mailto:${encodeURIComponent(currentDraft.to)}?subject=${encodeURIComponent(currentDraft.subject)}&body=${encodeURIComponent(body)}`;window.location.href=href};document.getElementById('email-modal').classList.add('open')}
async function copyEmailDraft(){if(!currentDraft)return;const text=`To: ${currentDraft.to}\nSubject: ${currentDraft.subject}\n\n${document.getElementById('email-body').value}`;try{await navigator.clipboard.writeText(text);alert('Email draft copied.')}catch(e){alert('Copy from the draft box manually.')}}

function exportTracker(singleId){const hires=singleId?state.hires.filter(h=>h.id===singleId):state.hires;if(!hires.length)return;const sum=hires.map(h=>{const p=progress(h);return`<tr><td>${esc(h.first)} ${esc(h.last)}</td><td>${esc(h.dept)}</td><td>${esc(h.manager||'')}</td><td>${esc(phaseLabel(currentPhase(h)))}</td><td>${p.pct}%</td><td>${blockedCount(h)}</td><td>${esc(fmtDate(h.startDate))}</td><td>${esc(h.managerSummary||'')}</td></tr>`}).join('');const rows=hires.map(h=>presetItems(h.departmentPreset).map(i=>{const s=tstate(h,i.id);return`<tr><td>${esc(h.first)} ${esc(h.last)}</td><td>${esc(h.dept)}</td><td>${esc(h.manager||'')}</td><td>${esc(h.hireType||'')}</td><td>${esc(phaseLabel(currentPhase(h)))}</td><td>${esc(i.sectionTitle)}</td><td>${esc(i.title)}</td><td>${esc(phaseLabel(s.targetPhase||i.phase))}</td><td>${esc(i.priority)}</td><td>${esc(s.ownerOverride||i.ownerLabel)}</td><td>${esc(statusLabel(s.status))}</td><td>${esc(s.note||s.skippedReason||'')}</td><td>${esc(s.updatedAt?fmtDT(s.updatedAt):'')}</td></tr>`}).join('')).join('');const html=`<html><head><meta charset="UTF-8"><style>body{font-family:Segoe UI,Arial,sans-serif;padding:24px;color:#1b2740}table{border-collapse:collapse;width:100%;margin-bottom:24px}th,td{border:1px solid #d5dfef;padding:8px 10px;font-size:12px;vertical-align:top}th{background:#eaf0fb;text-align:left}</style></head><body><h1>Onboarding Tracker Export</h1><p>Generated ${new Date().toLocaleString('en-US')}.</p><h2>Summary</h2><table><thead><tr><th>Hire</th><th>Dept</th><th>Manager</th><th>Phase</th><th>Completion</th><th>Blocked</th><th>Start</th><th>Summary</th></tr></thead><tbody>${sum}</tbody></table><h2>Task Detail</h2><table><thead><tr><th>Hire</th><th>Dept</th><th>Manager</th><th>Type</th><th>Phase</th><th>Section</th><th>Task</th><th>Target Phase</th><th>Priority</th><th>Owner</th><th>Status</th><th>Note</th><th>Updated</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;const blob=new Blob([html],{type:'application/vnd.ms-excel'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=singleId?'onboarding-hire.xls':'onboarding-tracker.xls';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}

document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal.open').forEach(m=>m.classList.remove('open'))});
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));
load();renderSidebar();renderDetail();switchView(state.view==='overview'?'overview':'detail');
