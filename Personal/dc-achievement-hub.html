<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Hub — Achievement Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --muted: #8e8e93;
  --sep: #e5e5ea; --blue: #007aff; --green: #34c759; --red: #ff3b30;
  --orange: #ff9f0a; --purple: #af52de; --indigo: #5856d6; --teal: #32ade6;
  --pink: #ff2d55; --gold: #b8860b;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.09), 0 8px 24px rgba(0,0,0,0.06);
  --radius: 14px; --radius-sm: 10px;
  --font: system-ui, -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  --sidebar: 270px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, select { font-family: var(--font); }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: var(--sidebar); min-width: var(--sidebar); background: #1c1c1e; display: flex; flex-direction: column; overflow: hidden; }
.main-area { flex: 1; overflow-y: auto; background: var(--bg); }

/* ── SIDEBAR ── */
.sb-top { padding: 20px 16px 0; }
.sb-logo { display: flex; align-items: center; gap: 10px; padding: 0 4px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sb-logo-icon { width: 38px; height: 38px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.sb-logo-text { line-height: 1.2; }
.sb-logo-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -0.4px; }
.sb-logo-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; }

.sb-profile-card { margin: 16px 0 4px; background: rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 10px; }
.sb-avatar { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.sb-profile-info { flex: 1; min-width: 0; }
.sb-profile-name { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-profile-level { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
.sb-xp-bar { height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.sb-xp-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; }

.sb-nav { padding: 12px 8px 0; }
.sb-nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.65); font-size: 13.5px; font-weight: 500; transition: all 0.14s; margin-bottom: 2px; border-left: 2.5px solid transparent; }
.sb-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.sb-nav-item.active { background: rgba(0,122,255,0.2); color: #fff; border-left-color: var(--blue); font-weight: 600; }
.sb-nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sb-section-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 1px; padding: 14px 18px 6px; }
.sb-roster { flex: 1; overflow-y: auto; padding: 0 8px; }
.sb-roster::-webkit-scrollbar { width: 4px; }
.sb-roster::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
.sb-member { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; cursor: pointer; transition: all 0.14s; margin-bottom: 2px; }
.sb-member:hover { background: rgba(255,255,255,0.06); }
.sb-member.active-member { background: rgba(255,255,255,0.1); }
.sb-member-avatar { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sb-member-info { flex: 1; min-width: 0; }
.sb-member-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-member-xp { font-size: 10.5px; color: rgba(255,255,255,0.35); }
.sb-member-xpbar { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.sb-member-xpfill { height: 100%; background: rgba(0,122,255,0.6); border-radius: 1px; }

.sb-bottom { padding: 10px 8px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
.sb-add-btn { width: 100%; padding: 9px; border-radius: 8px; background: rgba(0,122,255,0.18); color: var(--blue); font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; border: none; transition: all 0.14s; }
.sb-add-btn:hover { background: rgba(0,122,255,0.28); }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── STICKY DASH BAR ── */
.sticky-dash-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(28,28,30,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sdb-identity {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 32px 10px;
}
.sdb-avatar { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.sdb-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.sdb-level { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.sdb-xp-wrap { flex: 1; max-width: 220px; }
.sdb-xp-bar { height: 4px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; margin-bottom: 3px; }
.sdb-xp-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #5ac8fa); border-radius: 2px; transition: width 0.5s ease; }
.sdb-xp-text { font-size: 10px; color: rgba(255,255,255,0.35); white-space: nowrap; }
.sdb-pills { display: flex; gap: 6px; margin-left: auto; }
.sdb-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); white-space: nowrap; }
.sdb-pill.rank { background: rgba(0,122,255,0.25); color: #5ac8fa; }
.sdb-pill.count { background: rgba(52,199,89,0.2); color: #34c759; }

.sdb-filters {
  padding: 0 32px 10px;
  display: flex; flex-direction: column; gap: 7px;
}
.sdb-filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.sdb-filter-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.28); width: 60px; flex-shrink: 0; }
.sdb-chip { padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); background: transparent; transition: all 0.13s; user-select: none; white-space: nowrap; }
.sdb-chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.sdb-chip.active-status  { background: var(--blue);   border-color: var(--blue);   color: #fff; }
.sdb-chip.active-cat     { background: #2c2c2e;       border-color: rgba(255,255,255,0.3); color: #fff; }
.sdb-chip.active-rookie  { background: rgba(52,199,89,0.25);  border-color: #34c759; color: #34c759; }
.sdb-chip.active-pro     { background: rgba(0,122,255,0.25);  border-color: #007aff; color: #5ac8fa; }
.sdb-chip.active-expert  { background: rgba(175,82,222,0.25); border-color: #af52de; color: #c77dff; }
.sdb-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.1); margin: 0 2px; flex-shrink: 0; }

/* ── DASHBOARD ── */
.hero-banner { background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 55%, #1a1a2e 100%); padding: 40px 40px 36px; position: relative; overflow: hidden; }
.hero-banner::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 80% 50%, rgba(0,122,255,0.2) 0%, transparent 60%); pointer-events:none; }
.hero-inner { position: relative; max-width: 900px; }
.hero-rank-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 16px; }
.hero-level { font-size: 52px; font-weight: 900; color: #fff; letter-spacing: -2px; line-height: 1; }
.hero-level span { color: var(--blue); }
.hero-title { font-size: 17px; color: rgba(255,255,255,0.55); margin-top: 4px; font-weight: 500; }
.hero-xp-row { display: flex; align-items: center; gap: 12px; margin-top: 20px; }
.hero-xp-bar { flex: 1; max-width: 360px; height: 8px; background: rgba(255,255,255,0.12); border-radius: 4px; overflow: hidden; }
.hero-xp-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #5ac8fa); border-radius: 4px; transition: width 0.6s cubic-bezier(.25,.46,.45,.94); }
.hero-xp-text { font-size: 13px; color: rgba(255,255,255,0.5); white-space: nowrap; }
.hero-ach-count { margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.5); }
.hero-ach-count strong { color: #fff; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 24px 32px; }
.stat-card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); }
.stat-card-val { font-size: 30px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
.stat-card-lbl { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 3px; }
.stat-card-icon { font-size: 22px; margin-bottom: 8px; }

/* ── CATEGORY RINGS ── */
.rings-section { padding: 0 32px 24px; }
.section-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; margin-bottom: 16px; }
.rings-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
.ring-card { background: var(--card); border-radius: var(--radius); padding: 16px 10px; box-shadow: var(--shadow-sm); text-align: center; }
.ring-wrap { position: relative; width: 64px; height: 64px; margin: 0 auto 10px; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--sep); stroke-width: 6; }
.ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.25,.46,.45,.94); }
.ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text); }
.ring-icon { font-size: 20px; margin-bottom: 4px; }
.ring-name { font-size: 10.5px; color: var(--muted); font-weight: 500; line-height: 1.3; }
.ring-count { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── ACHIEVEMENT GRID ── */
.grid-section { padding: 0 32px 60px; }
.filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.f-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--sep); background: var(--card); color: var(--muted); transition: all 0.14s; user-select: none; white-space: nowrap; }
.f-pill:hover { border-color: var(--blue); color: var(--blue); }
.f-pill.active { background: var(--blue); border-color: var(--blue); color: white; }
.ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

/* ── DASHBOARD CATEGORY SECTIONS ── */
.dash-cat-section { margin-bottom: 36px; }
.dash-cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 2px solid var(--sep); }
.dash-cat-icon { font-size: 22px; line-height: 1; }
.dash-cat-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; flex: 1; }
.dash-cat-progress { font-size: 12px; color: var(--muted); font-weight: 600; background: var(--bg); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.dash-cat-progress.complete { background: rgba(52,199,89,0.12); color: var(--green); }

/* ── TIER ROWS within category sections ── */
.tier-block { margin-bottom: 20px; }
.tier-block:last-child { margin-bottom: 0; }
.tier-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 7px 12px; border-radius: var(--radius-sm); }
.tier-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tier-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; }
.tier-desc { font-size: 11px; color: var(--muted); font-weight: 500; margin-left: 2px; }
.tier-count { margin-left: auto; font-size: 11px; font-weight: 600; opacity: 0.7; }

/* Achievement cards */
.ach-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.14s, box-shadow 0.14s; position: relative; }
.ach-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.ach-card.earned { box-shadow: var(--shadow-sm), 0 0 0 1.5px rgba(52,199,89,0.45); }
.ach-card.locked { opacity: 0.62; filter: grayscale(0.4); border: 1.5px dashed var(--sep); box-shadow: none; }
.ach-card.locked:hover { opacity: 0.88; filter: grayscale(0.1); border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.ach-lock-badge { font-size: 9px; font-weight: 700; color: var(--muted); background: var(--bg); padding: 2px 7px; border-radius: 6px; letter-spacing: 0.3px; }
.ach-tier-tag { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-top: 6px; align-self: flex-start; letter-spacing: 0.3px; }
.tier-tag-rookie { background: rgba(52,199,89,0.10);  color: #34c759; }
.tier-tag-pro    { background: rgba(0,122,255,0.10);  color: #007aff; }
.tier-tag-expert { background: rgba(175,82,222,0.10); color: #af52de; }
.ach-body { padding: 14px; display: flex; flex-direction: column; }
.ach-top-bar { height: 3px; width: 100%; }
.ach-body { padding: 14px; }
.ach-icon-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.ach-icon { font-size: 28px; }
.ach-check { width: 22px; height: 22px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; }
.ach-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.ach-desc { font-size: 11px; color: var(--muted); line-height: 1.45; margin-bottom: 8px; }
.ach-footer { display: flex; align-items: center; justify-content: space-between; }
.ach-rarity { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.ach-xp { font-size: 11px; font-weight: 700; color: var(--muted); }

/* Rarity colors */
.r-common .ach-top-bar { background: #8e8e93; }
.r-common .ach-rarity { color: #8e8e93; }
.r-uncommon .ach-top-bar { background: var(--green); }
.r-uncommon .ach-rarity { color: var(--green); }
.r-rare .ach-top-bar { background: var(--blue); }
.r-rare .ach-rarity { color: var(--blue); }
.r-epic .ach-top-bar { background: var(--purple); }
.r-epic .ach-rarity { color: var(--purple); }
.r-legendary .ach-top-bar { background: var(--gold); }
.r-legendary .ach-rarity { color: var(--gold); }

/* ── WELCOME CARD ── */
.welcome-wrap { padding: 80px 32px; display: flex; justify-content: center; }
.welcome-card { background: var(--card); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 440px; box-shadow: var(--shadow-md); }
.welcome-emoji { font-size: 56px; margin-bottom: 20px; }
.welcome-title { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 10px; }
.welcome-sub { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
.btn-primary { background: var(--blue); color: white; padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: all 0.14s; }
.btn-primary:hover { background: #0066dd; transform: translateY(-1px); }

/* ── LEADERBOARD ── */
.lb-header { padding: 32px 32px 0; }
.lb-title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.7px; }
.lb-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
.lb-toggles { display: flex; gap: 6px; margin-top: 16px; margin-bottom: 24px; }
.toggle-btn { padding: 7px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 600; border: 1.5px solid var(--sep); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.14s; }
.toggle-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
.lb-list { padding: 0 32px 60px; display: flex; flex-direction: column; gap: 10px; }
.lb-card { background: var(--card); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px; border: 1.5px solid transparent; transition: all 0.2s; }
.lb-card.rank-1 { background: linear-gradient(135deg, #fffbea, #fff3c4); border-color: #f0c040; }
.lb-card.rank-2 { background: linear-gradient(135deg, #f5f5f7, #e8e8ed); border-color: #b0b0b8; }
.lb-card.rank-3 { background: linear-gradient(135deg, #fff3ea, #ffe8d0); border-color: #d4956a; }
.lb-card.current-profile { border-color: var(--blue) !important; box-shadow: var(--shadow-sm), 0 0 0 1px var(--blue); }
.lb-rank { font-size: 22px; font-weight: 900; color: var(--muted); width: 36px; text-align: center; flex-shrink: 0; }
.lb-rank.rank-1-num { color: #b8860b; }
.lb-rank.rank-2-num { color: #8e8e93; }
.lb-rank.rank-3-num { color: #c06020; }
.lb-avatar { width: 48px; height: 48px; border-radius: 13px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 15px; font-weight: 700; color: var(--text); }
.lb-role { font-size: 12px; color: var(--muted); }
.lb-level-badge { font-size: 11px; font-weight: 600; background: rgba(0,122,255,0.1); color: var(--blue); padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 2px; }
.lb-xp-bar-wrap { margin-top: 6px; height: 4px; background: var(--sep); border-radius: 2px; overflow: hidden; max-width: 200px; }
.lb-xp-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; width: 0; transition: width 0.8s cubic-bezier(.25,.46,.45,.94); }
.lb-stats { text-align: right; flex-shrink: 0; }
.lb-xp-val { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.lb-ach-val { font-size: 12px; color: var(--muted); margin-top: 2px; }
.lb-crown { font-size: 20px; margin-left: 4px; }
.lb-cat-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.lb-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.7; }

/* ── ALL ACHIEVEMENTS PAGE ── */
.all-ach-header { padding: 32px 32px 0; }
.all-ach-title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.7px; }
.all-ach-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 16px; margin-bottom: 6px; }
.profile-selector { padding: 7px 12px; border-radius: 10px; border: 1.5px solid var(--sep); background: var(--card); font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; }
.search-input { padding: 7px 14px; border-radius: 10px; border: 1.5px solid var(--sep); background: var(--card); font-size: 13px; color: var(--text); outline: none; width: 200px; }
.search-input:focus { border-color: var(--blue); }
.all-ach-grid-wrap { padding: 16px 32px 60px; }
.all-ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

/* All-ach card extras */
.ach-award-btn { margin-top: 8px; width: 100%; padding: 6px; border-radius: 8px; font-size: 11.5px; font-weight: 600; background: rgba(0,122,255,0.1); color: var(--blue); border: none; cursor: pointer; transition: all 0.14s; }
.ach-award-btn:hover { background: rgba(0,122,255,0.2); }
.ach-remove-btn { margin-top: 8px; width: 100%; padding: 6px; border-radius: 8px; font-size: 11.5px; font-weight: 600; background: rgba(255,59,48,0.08); color: var(--red); border: none; cursor: pointer; transition: all 0.14s; }
.ach-remove-btn:hover { background: rgba(255,59,48,0.15); }

/* ── MANAGE TEAM ── */

function save() {
  data.appMode = appMode;
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}
function load() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) {
      data = JSON.parse(d);
      appMode = data.appMode || 'manager';
      currentPage = appMode === 'individual' ? 'dashboard' : 'team';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function genId() { return Math.random().toString(36).substr(2,9); }
function getProfile(id) { return data.profiles.find(p => p.id === id); }
function activeProfile() { return getProfile(data.activeProfileId); }

function calcXP(earnedIds) {
  return earnedIds.reduce((sum, id) => {
    const a = ACHIEVEMENTS.find(a => a.id === id);
    return sum + (a ? XP_MAP[a.rarity] : 0);
  }, 0);
}

function getLevel(xp) {
  let lvl = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.xp) lvl = l; }
  return lvl;
}

function getNextLevel(xp) {
  for (const l of LEVELS) { if (xp < l.xp) return l; }
  return null;
}

function xpProgress(xp) {
  const cur = getLevel(xp);
  const nxt = getNextLevel(xp);
  if (!nxt) return 1;
  const range = nxt.xp - cur.xp;
  const done  = xp - cur.xp;
  return Math.min(done / range, 1);
}

function getRank(profileId) {
  const sorted = [...data.profiles].sort((a,b) => calcXP(b.earnedIds) - calcXP(a.earnedIds));
  return sorted.findIndex(p => p.id === profileId) + 1;
}

function catStats(profile) {
  const result = {};
  for (const c of CATEGORIES) {
    const total = ACHIEVEMENTS.filter(a => a.cat === c.id).length;
    const earned = (profile.earnedIds || []).filter(id => {
      const a = ACHIEVEMENTS.find(a => a.id === id);
      return a && a.cat === c.id;
    }).length;
    result[c.id] = { earned, total, pct: total ? earned/total : 0 };
  }
  return result;
}

function checkMilestones(profile) {
  const count = profile.earnedIds.length;
  const added = [];
  if (count >= 25 && !profile.earnedIds.includes('trophy_25')) { profile.earnedIds.push('trophy_25'); added.push('trophy_25'); }
  if (count >= 50 && !profile.earnedIds.includes('ach_master')) { profile.earnedIds.push('ach_master'); added.push('ach_master'); }
  if (ACHIEVEMENTS.every(a => profile.earnedIds.includes(a.id)) && !profile.earnedIds.includes('the_goat')) {
    profile.earnedIds.push('the_goat'); added.push('the_goat');
  }
  return added;
}

// ── AWARD / REMOVE ────────────────────────────────────────────────────────────
function awardAchievement(profileId, achId, event) {
  const profile = getProfile(profileId);
  if (!profile || profile.earnedIds.includes(achId)) return;
  const ach = ACHIEVEMENTS.find(a => a.id === achId);
  if (!ach) return;
  profile.earnedIds.push(achId);
  const milestones = checkMilestones(profile);
  save();
  showXpFloat(event, `+${XP_MAP[ach.rarity]} XP`);
  showToast(`${ach.icon} ${ach.name} Unlocked! +${XP_MAP[ach.rarity]} XP`);
  if (ach.rarity === 'epic' || ach.rarity === 'legendary') fireConfetti();
  for (const mid of milestones) {
    const ma = ACHIEVEMENTS.find(a => a.id === mid);
    if (ma) { showToast(`${ma.icon} ${ma.name} auto-awarded! +${XP_MAP[ma.rarity]} XP`); }
  }
  renderAll();
}

function removeAchievement(profileId, achId) {
  const profile = getProfile(profileId);
  if (!profile) return;
  profile.earnedIds = profile.earnedIds.filter(id => id !== achId);
  save();
  renderAll();
}

// ── TOAST / FLOAT / CONFETTI ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const tb = document.getElementById('toastBar');
  tb.textContent = msg;
  tb.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => tb.classList.remove('show'), 3500);
}

function showXpFloat(event, text) {
  if (!event) return;
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = text;
  el.style.left = (event.clientX - 20) + 'px';
  el.style.top  = (event.clientY - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -200,
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
    color: ['#007aff','#34c759','#ff9f0a','#af52de','#ff2d55','#b8860b','#32ade6'][Math.floor(Math.random()*7)],
    rot: Math.random() * 360,
    vx: (Math.random()-0.5)*3,
    vy: Math.random()*4+2,
    vr: (Math.random()-0.5)*8,
    life: 1
  }));
  let frame;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    for (const p of pieces) {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life -= 0.008;
      if (p.y < canvas.height && p.life > 0) alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── MODE SWITCH ───────────────────────────────────────────────────────────────
function setMode(mode) {
  appMode = mode;
  currentPage = mode === 'individual' ? 'dashboard' : 'team';
  save();
  renderAll();
  showPage(currentPage);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  // Mode toggle buttons
  document.getElementById('modeManagerBtn').className    = 'mode-btn' + (appMode==='manager'?'    active':'');
  document.getElementById('modeIndividualBtn').className = 'mode-btn' + (appMode==='individual'?' active-ind active':'');

  const p = activeProfile();
  const pc = document.getElementById('sbProfileCard');
  if (p) {
    const xp = calcXP(p.earnedIds);
    const lvl = getLevel(xp);
    const prog = xpProgress(xp);
    pc.style.display = 'flex';
    document.getElementById('sbAvatar').textContent = p.avatar;
    document.getElementById('sbName').textContent = p.name;
    document.getElementById('sbLevelLabel').textContent = `Lv.${lvl.lvl} ${lvl.title}`;
    document.getElementById('sbXpFill').style.width = (prog*100)+'%';
  } else {
    pc.style.display = 'none';
  }

  // Nav items per mode
  const managerNav = [
    { page:'team',       icon:'🏆', label:'Team Overview' },
    { page:'leaderboard',icon:'🥇', label:'Leaderboard' },
    { page:'catalog',    icon:'📚', label:'All Achievements' },
    { page:'manage',     icon:'⚙️', label:'Manage Team' },
  ];
  const individualNav = [
    { page:'dashboard',  icon:'🏠', label:'My Dashboard' },
    { page:'catalog',    icon:'📚', label:'My Achievements' },
  ];
  const navItems = appMode === 'manager' ? managerNav : individualNav;
  const nav = document.getElementById('sbNav');
  nav.innerHTML = navItems.map(n =>
    `<div class="sb-nav-item ${currentPage===n.page?'active':''}" data-page="${n.page}"><span class="sb-nav-icon">${n.icon}</span> ${n.label}</div>`
  ).join('');
  nav.querySelectorAll('.sb-nav-item').forEach(el => {
    el.addEventListener('click', () => showPage(el.dataset.page));
  });

  // Roster + bottom area
  const rosterLabel = document.getElementById('sbRosterLabel');
  const roster = document.getElementById('sbRoster');
  const sbBottom = document.getElementById('sbBottom');

  if (appMode === 'manager') {
    rosterLabel.style.display = '';
    roster.style.display = '';
    sbBottom.innerHTML = '<button class="sb-add-btn" id="sbAddBtn">+ Add Profile</button>';
    document.getElementById('sbAddBtn').addEventListener('click', () => openProfileModal(null));

    if (!data.profiles.length) {
      roster.innerHTML = '<div style="padding:12px 18px;font-size:12px;color:rgba(255,255,255,0.28)">No profiles yet</div>';
      return;
    }
    roster.innerHTML = data.profiles.map(m => {
      const xp = calcXP(m.earnedIds);
      const prog = Math.min(xp/30000, 1);
      const isActive = m.id === data.activeProfileId;
      return `<div class="sb-member ${isActive?'active-member':''}" data-pid="${m.id}">
        <div class="sb-member-avatar">${m.avatar}</div>
        <div class="sb-member-info">
          <div class="sb-member-name">${m.name}</div>
          <div class="sb-member-xp">${xp.toLocaleString()} XP · ${m.earnedIds.length} ach</div>
          <div class="sb-member-xpbar"><div class="sb-member-xpfill" style="width:${prog*100}%"></div></div>
        </div>
      </div>`;
    }).join('');
    roster.querySelectorAll('.sb-member').forEach(el => {
      el.addEventListener('click', () => {
        data.activeProfileId = el.dataset.pid;
        catalogViewProfileId = el.dataset.pid;
        save();
        renderAll();
      });
    });
  } else {
    // Individual mode — no roster, export button instead
    rosterLabel.style.display = 'none';
    roster.style.display = 'none';
    sbBottom.innerHTML = `
      <button class="sb-ind-export-btn" id="sbExportMyBtn">⬇ Export My Data</button>
      <button class="sb-add-btn" id="sbAddBtn" style="margin-top:6px">+ Add Profile</button>`;
    document.getElementById('sbExportMyBtn').addEventListener('click', exportMyProfile);
    document.getElementById('sbAddBtn').addEventListener('click', () => openProfileModal(null));
  }
}

function renderNav() {
  document.querySelectorAll('#sbNav .sb-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === currentPage);
  });
}

// ── PAGES ─────────────────────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageEl = document.getElementById('page-'+page);
  if (pageEl) pageEl.classList.add('active');
  renderNav();
  if (page === 'team')        renderTeamOverview();
  if (page === 'dashboard')   renderDashboard();
  if (page === 'leaderboard') renderLeaderboard();
  if (page === 'catalog')     renderCatalog();
  if (page === 'manage')      renderManage();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const wrap = document.getElementById('dashboardContent');
  const p = activeProfile();
  if (!p) {
    wrap.innerHTML = `<div class="welcome-wrap"><div class="welcome-card">
      <div class="welcome-emoji">🏆</div>
      <div class="welcome-title">Welcome to DC Hub</div>
      <div class="welcome-sub">Track your Data Consulting achievements, earn XP, and compete with your team. Create a profile to get started.</div>
      <button class="btn-primary" id="welcomeCreateBtn">Create Your Profile</button>
    </div></div>`;
    document.getElementById('welcomeCreateBtn').addEventListener('click', () => {
      showPage('manage');
      openProfileModal(null);
    });
    return;
  }

  const xp = calcXP(p.earnedIds);
  const lvl = getLevel(xp);
  const nxt = getNextLevel(xp);
  const prog = xpProgress(xp);
  const rank = getRank(p.id);
  const earned = p.earnedIds.length;
  const total = ACHIEVEMENTS.length;
  const pct = Math.round(earned/total*100);
  const stats = catStats(p);

  // Filter achievements — status + category + tier
  let filtered = ACHIEVEMENTS;
  if (dashFilter === 'earned') filtered = filtered.filter(a => p.earnedIds.includes(a.id));
  else if (dashFilter === 'locked') filtered = filtered.filter(a => !p.earnedIds.includes(a.id));
  if (dashCatFilter !== 'all') filtered = filtered.filter(a => a.cat === dashCatFilter);
  if (dashTierFilter !== 'all') filtered = filtered.filter(a => getTier(a.rarity) === dashTierFilter);

  const tierChipClass = t => dashTierFilter === t ? `active-${t}` : '';

  wrap.innerHTML = `
    <!-- ── STICKY BAR ── -->
    <div class="sticky-dash-bar">
      <div class="sdb-identity">
        <div class="sdb-avatar">${p.avatar}</div>
        <div>
          <div class="sdb-name">${p.name}</div>
          <div class="sdb-level">${lvl.emoji} ${lvl.title} · Level ${lvl.lvl}</div>
        </div>
        <div class="sdb-xp-wrap">
          <div class="sdb-xp-bar"><div class="sdb-xp-fill" style="width:${prog*100}%"></div></div>
          <div class="sdb-xp-text">${xp.toLocaleString()} XP${nxt ? ` · ${(nxt.xp-xp).toLocaleString()} to next level` : ' · MAX LEVEL'}</div>
        </div>
        <div class="sdb-pills">
          <div class="sdb-pill count">🏅 ${earned}/${total}</div>
          <div class="sdb-pill rank">#${rank} Team</div>
        </div>
      </div>
      <div class="sdb-filters">
        <div class="sdb-filter-row">
          <div class="sdb-filter-label">Status</div>
          <div class="sdb-chip ${dashFilter==='all'?'active-status':''}" data-status="all">All</div>
          <div class="sdb-chip ${dashFilter==='earned'?'active-status':''}" data-status="earned">✓ Earned</div>
          <div class="sdb-chip ${dashFilter==='locked'?'active-status':''}" data-status="locked">⬡ Locked</div>
          <div class="sdb-divider"></div>
          <div class="sdb-filter-label" style="width:auto">Tier</div>
          <div class="sdb-chip ${dashTierFilter==='all'?'active-status':''}" data-tier="all">All Tiers</div>
          <div class="sdb-chip ${tierChipClass('rookie')}" data-tier="rookie">🟢 Rookie</div>
          <div class="sdb-chip ${tierChipClass('pro')}" data-tier="pro">🔵 Pro</div>
          <div class="sdb-chip ${tierChipClass('expert')}" data-tier="expert">🟣 Expert</div>
        </div>
        <div class="sdb-filter-row">
          <div class="sdb-filter-label">Category</div>
          <div class="sdb-chip ${dashCatFilter==='all'?'active-cat':''}" data-cat="all">All</div>
          ${CATEGORIES.map(c => `<div class="sdb-chip ${dashCatFilter===c.id?'active-cat':''}" data-cat="${c.id}">${c.icon} ${c.title.split(' ')[0]}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="hero-banner">
      <div class="hero-inner">
        <div class="hero-rank-pill">${rank <= data.profiles.length ? `#${rank} of ${data.profiles.length}` : '#1'} on Team</div>
        <div class="hero-level">Level <span>${lvl.lvl}</span></div>
        <div class="hero-title">${lvl.emoji} ${lvl.title}</div>
        <div class="hero-xp-row">
          <div class="hero-xp-bar"><div class="hero-xp-fill" id="heroXpFill" style="width:0%"></div></div>
          <div class="hero-xp-text">${xp.toLocaleString()} XP${nxt ? ` / ${nxt.xp.toLocaleString()}` : ' · MAX'}</div>
        </div>
        <div class="hero-ach-count"><strong>${earned}</strong> of ${total} achievements earned</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-icon">⚡</div><div class="stat-card-val">${xp.toLocaleString()}</div><div class="stat-card-lbl">Total XP</div></div>
      <div class="stat-card"><div class="stat-card-icon">🏅</div><div class="stat-card-val">${earned}</div><div class="stat-card-lbl">Achievements Earned</div></div>
      <div class="stat-card"><div class="stat-card-icon">📊</div><div class="stat-card-val">${pct}%</div><div class="stat-card-lbl">Completion</div></div>
      <div class="stat-card"><div class="stat-card-icon">🥇</div><div class="stat-card-val">#${rank}</div><div class="stat-card-lbl">Team Rank</div></div>
    </div>
    <div class="rings-section">
      <div class="section-title">Category Progress</div>
      <div class="rings-grid">${CATEGORIES.map(c => {
        const s = stats[c.id];
        const r = 26; const circ = 2*Math.PI*r;
        const offset = circ * (1 - s.pct);
        return `<div class="ring-card">
          <div class="ring-icon">${c.icon}</div>
          <div class="ring-wrap">
            <svg class="ring-svg" width="64" height="64" viewBox="0 0 64 64">
              <circle class="ring-bg" cx="32" cy="32" r="${r}"/>
              <circle class="ring-fill" cx="32" cy="32" r="${r}" stroke="${c.color}"
                stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-offset="${offset}" data-circ="${circ}"/>
            </svg>
            <div class="ring-pct">${Math.round(s.pct*100)}%</div>
          </div>
          <div class="ring-name">${c.title.split(' ')[0]}</div>
          <div class="ring-count">${s.earned}/${s.total}</div>
        </div>`;
      }).join('')}</div>
    </div>
    <div class="grid-section">
      <div class="section-title" style="display:flex;align-items:center;gap:8px;">Achievements <span style="font-size:12px;font-weight:500;color:var(--muted);">${filtered.length} shown</span></div>
      ${CATEGORIES.map(cat => {
        const catAchs = filtered.filter(a => a.cat === cat.id);
        if (!catAchs.length) return '';
        const earnedInCat = catAchs.filter(a => p.earnedIds.includes(a.id)).length;
        const totalInCat  = ACHIEVEMENTS.filter(a => a.cat === cat.id).length;
        const isComplete  = earnedInCat === totalInCat && totalInCat > 0;

        const tierBlocks = TIERS.map(tier => {
          const tierAchs = catAchs.filter(a => tier.rarities.includes(a.rarity));
          if (!tierAchs.length) return '';
          const tierEarned = tierAchs.filter(a => p.earnedIds.includes(a.id)).length;
          return `<div class="tier-block">
            <div class="tier-header" style="background:${tier.bg}">
              <div class="tier-dot" style="background:${tier.color}"></div>
              <div class="tier-label" style="color:${tier.color}">${tier.label}</div>
              <div class="tier-desc">${tier.desc}</div>
              <div class="tier-count" style="color:${tier.color}">${tierEarned}/${tierAchs.length}</div>
            </div>
            <div class="ach-grid">${tierAchs.map(a => renderAchCard(a, p.earnedIds.includes(a.id), true)).join('')}</div>
          </div>`;
        }).join('');

        return `<div class="dash-cat-section">
          <div class="dash-cat-header">
            <div class="dash-cat-icon">${cat.icon}</div>
            <div class="dash-cat-title">${cat.title}</div>
            <div class="dash-cat-progress${isComplete?' complete':''}">${isComplete?'✓ Complete':`${earnedInCat} / ${totalInCat}`}</div>
          </div>
          ${tierBlocks}
        </div>`;
      }).join('')}
    </div>`;

  // Animate rings
  setTimeout(() => {
    document.getElementById('heroXpFill').style.width = (prog*100)+'%';
    document.querySelectorAll('.ring-fill').forEach(el => {
      el.style.strokeDashoffset = el.dataset.offset;
    });
  }, 50);

  // Sticky bar chips
  wrap.querySelectorAll('.sdb-chip[data-status]').forEach(el => {
    el.addEventListener('click', () => { dashFilter = el.dataset.status; renderDashboard(); });
  });
  wrap.querySelectorAll('.sdb-chip[data-tier]').forEach(el => {
    el.addEventListener('click', () => { dashTierFilter = el.dataset.tier; renderDashboard(); });
  });
  wrap.querySelectorAll('.sdb-chip[data-cat]').forEach(el => {
    el.addEventListener('click', () => { dashCatFilter = el.dataset.cat; renderDashboard(); });
  });


  // Ach card clicks
  wrap.querySelectorAll('.ach-card[data-id]').forEach(el => {
    el.addEventListener('click', ev => {
      const id = el.dataset.id;
      const isEarned = p.earnedIds.includes(id);
      if (isEarned) {
        if (confirm('Remove this achievement from your profile?')) removeAchievement(p.id, id);
      } else {
        awardAchievement(p.id, id, ev);
      }
    });
  });
}

function renderAchCard(ach, isEarned, clickable=true) {
  const rarityColor = { common:'#8e8e93', uncommon:'#34c759', rare:'#007aff', epic:'#af52de', legendary:'#b8860b' };
  return `<div class="ach-card r-${ach.rarity} ${isEarned?'earned':'locked'}" data-id="${ach.id}" ${clickable?'style="cursor:pointer"':''}>
    <div class="ach-top-bar"></div>
    <div class="ach-body">
      <div class="ach-icon-row">
        <div class="ach-icon">${ach.icon}</div>
        ${isEarned ? '<div class="ach-check">✓</div>' : '<div class="ach-lock-badge">+ Award</div>'}
      </div>
      <div class="ach-name">${ach.name}</div>
      <div class="ach-desc">${ach.desc}</div>
      <div class="ach-hint">${ach.hint}</div>
      <div class="ach-footer">
        <div class="ach-rarity">${ach.rarity}</div>
        <div class="ach-xp">+${XP_MAP[ach.rarity]} XP</div>
      </div>
      <div class="ach-tier-tag tier-tag-${getTier(ach.rarity)}">${getTier(ach.rarity) === 'rookie' ? '🟢 Rookie' : getTier(ach.rarity) === 'pro' ? '🔵 Pro' : '🟣 Expert'}</div>
    </div>
  </div>`;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const wrap = document.getElementById('leaderboardContent');
  if (!data.profiles.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">👥</div><div class="empty-state-text">No profiles yet. Add team members to see the leaderboard.</div></div>';
    return;
  }

  const sorted = [...data.profiles].sort((a,b) => {
    if (lbSort === 'xp') return calcXP(b.earnedIds) - calcXP(a.earnedIds);
    if (lbSort === 'achievements') return b.earnedIds.length - a.earnedIds.length;
    return calcXP(b.earnedIds) - calcXP(a.earnedIds);
  });

  const maxXp = Math.max(...sorted.map(p => calcXP(p.earnedIds)), 1);

  const rankClass = i => i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
  const rankNumClass = i => i===0?'rank-1-num':i===1?'rank-2-num':i===2?'rank-3-num':'';
  const rankEmoji = i => i===0?'👑':i===1?'🥈':i===2?'🥉':'';

  wrap.innerHTML = `
    <div class="lb-header">
      <div class="lb-title">Team Leaderboard</div>
      <div class="lb-sub">${data.profiles.length} member${data.profiles.length!==1?'s':''} competing</div>
      <div class="lb-toggles">
        ${['xp','achievements'].map(s=>`<button class="toggle-btn ${lbSort===s?'active':''}" data-sort="${s}">${s==='xp'?'By XP':'By Achievements'}</button>`).join('')}
      </div>
    </div>
    <div class="lb-list">
      ${sorted.map((p,i) => {
        const xp = calcXP(p.earnedIds);
        const lvl = getLevel(xp);
        const prog = xp/maxXp;
        const stats = catStats(p);
        const isCurrent = p.id === data.activeProfileId;
        return `<div class="lb-card ${rankClass(i)} ${isCurrent?'current-profile':''}">
          <div class="lb-rank ${rankNumClass(i)}">${i+1}</div>
          <div class="lb-avatar">${p.avatar}</div>
          <div class="lb-info">
            <div class="lb-name">${p.name} ${rankEmoji(i)}</div>
            <div class="lb-role">${p.role||'Data Consultant'}</div>
            <div class="lb-level-badge">Lv.${lvl.lvl} · ${lvl.title}</div>
            <div class="lb-xp-bar-wrap"><div class="lb-xp-bar-fill" data-w="${prog*100}"></div></div>
            <div class="lb-cat-dots">${CATEGORIES.map(c=>{
              const s=stats[c.id];
              const op=s.pct>0?0.4+s.pct*0.6:0.15;
              return `<div class="lb-dot" style="background:${c.color};opacity:${op}" title="${c.title}: ${Math.round(s.pct*100)}%"></div>`;
            }).join('')}</div>
          </div>
          <div class="lb-stats">
            <div class="lb-xp-val">${xp.toLocaleString()}</div>
            <div class="lb-ach-val">${p.earnedIds.length} achievements</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  wrap.querySelectorAll('.toggle-btn').forEach(el => {
    el.addEventListener('click', () => { lbSort = el.dataset.sort; renderLeaderboard(); });
  });

  setTimeout(() => {
    wrap.querySelectorAll('.lb-xp-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 60);
}

// ── CATALOG ───────────────────────────────────────────────────────────────────
function renderCatalog() {
  const wrap = document.getElementById('catalogContent');
  if (!catalogViewProfileId && data.activeProfileId) catalogViewProfileId = data.activeProfileId;

  const viewProfile = catalogViewProfileId ? getProfile(catalogViewProfileId) : null;
  const earnedIds = viewProfile ? viewProfile.earnedIds : [];

  let filtered = ACHIEVEMENTS;
  if (catalogFilter.cat !== 'all') filtered = filtered.filter(a => a.cat === catalogFilter.cat);
  if (catalogFilter.rarity !== 'all') filtered = filtered.filter(a => a.rarity === catalogFilter.rarity);
  if (catalogFilter.search) {
    const q = catalogFilter.search.toLowerCase();
    filtered = filtered.filter(a => a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));
  }

  wrap.innerHTML = `
    <div class="all-ach-header">
      <div class="all-ach-title">All Achievements <span style="font-size:16px;color:var(--muted);font-weight:500">(${ACHIEVEMENTS.length})</span></div>
      <div class="all-ach-controls">
        <select class="profile-selector" id="catalogProfileSel">
          <option value="">-- No Profile --</option>
          ${data.profiles.map(p=>`<option value="${p.id}" ${p.id===catalogViewProfileId?'selected':''}>${p.avatar} ${p.name}</option>`).join('')}
        </select>
        <input type="text" class="search-input" id="catalogSearch" placeholder="Search..." value="${catalogFilter.search}">
      </div>
      <div class="filter-bar" style="margin-top:10px">
        <div class="f-pill ${catalogFilter.cat==='all'?'active':''}" data-cat="all">All</div>
        ${CATEGORIES.map(c=>`<div class="f-pill ${catalogFilter.cat===c.id?'active':''}" data-cat="${c.id}">${c.icon} ${c.title.split(' ')[0]}</div>`).join('')}
        <div style="width:1px;height:20px;background:var(--sep);margin:0 4px"></div>
        ${['common','uncommon','rare','epic','legendary'].map(r=>`<div class="f-pill ${catalogFilter.rarity===r?'active':''}" data-rarity="${r}">${r}</div>`).join('')}
      </div>
    </div>
    <div class="all-ach-grid-wrap">
      <div class="all-ach-grid">${filtered.map(a => {
        const isEarned = earnedIds.includes(a.id);
        return `<div class="ach-card r-${a.rarity} ${isEarned?'earned':''}" data-id="${a.id}" style="cursor:default;opacity:1;filter:none">
          <div class="ach-top-bar"></div>
          <div class="ach-body">
            <div class="ach-icon-row">
              <div class="ach-icon">${a.icon}</div>
              ${isEarned?'<div class="ach-check">✓</div>':''}
            </div>
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${a.desc}</div>
            <div class="ach-hint">${a.hint}</div>
            <div class="ach-footer">
              <div class="ach-rarity">${a.rarity}</div>
              <div class="ach-xp">+${XP_MAP[a.rarity]} XP</div>
            </div>
            ${viewProfile ? (isEarned
              ? `<button class="ach-remove-btn" data-aid="${a.id}">✕ Remove</button>`
              : `<button class="ach-award-btn" data-aid="${a.id}">+ Award</button>`)
            : ''}
          </div>
        </div>`;
      }).join('')}
      ${filtered.length===0?'<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-emoji">🔍</div><div class="empty-state-text">No achievements match your filter.</div></div>':''}
      </div>
    </div>`;

  document.getElementById('catalogProfileSel').addEventListener('change', e => {
    catalogViewProfileId = e.target.value || null;
    renderCatalog();
  });
  document.getElementById('catalogSearch').addEventListener('input', e => {
    catalogFilter.search = e.target.value;
    renderCatalog();
  });
  wrap.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', () => { catalogFilter.cat = el.dataset.cat; renderCatalog(); });
  });
  wrap.querySelectorAll('[data-rarity]').forEach(el => {
    el.addEventListener('click', () => {
      catalogFilter.rarity = catalogFilter.rarity === el.dataset.rarity ? 'all' : el.dataset.rarity;
      renderCatalog();
    });
  });
  wrap.querySelectorAll('.ach-award-btn').forEach(el => {
    el.addEventListener('click', ev => {
      if (!catalogViewProfileId) return;
      awardAchievement(catalogViewProfileId, el.dataset.aid, ev);
    });
  });
  wrap.querySelectorAll('.ach-remove-btn').forEach(el => {
    el.addEventListener('click', () => {
      if (!catalogViewProfileId) return;
      if (confirm('Remove this achievement?')) removeAchievement(catalogViewProfileId, el.dataset.aid);
    });
  });
}

      <div class="manage-actions">
        <button class="btn-primary" id="addProfileBtn">+ Add Profile</button>
      </div>
    </div>
    <div class="profiles-grid">
      ${data.profiles.length === 0 ? `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-emoji">👥</div><div class="empty-state-text">No profiles yet. Add your first team member.</div></div>` :
        data.profiles.map(p => {

          return `<div class="profile-card">

              <button class="btn-sm-del" data-pid="${p.id}">Delete</button>

          </div>`;
        }).join('')}

    <!-- Sync Section -->
    <div class="sync-card">
      <div class="sync-card-header">
        <div>
          <div class="sync-card-title">📤 Employee Sync</div>
          <div class="sync-card-sub">Import a team member's exported profile file to merge their earned achievements. Individual users export from their own device — you import here to update the team record.</div>
        </div>
      </div>
      <div class="sync-actions">
        <button class="btn-sync btn-sync-import" id="syncImportBtn">⬆ Import Employee Profile</button>
        <input type="file" id="syncImportFile" accept=".json" style="display:none">

        <button class="btn-sync btn-sync-import" id="fullImportBtn" style="border-color:rgba(255,59,48,0.4);color:var(--red);background:rgba(255,59,48,0.07)">↩ Restore Backup</button>

  document.getElementById('fullExportBtn').addEventListener('click', exportData);

// ── PROFILE MODAL ─────────────────────────────────────────────────────────────
function openProfileModal(editId) {
  const existing = editId ? getProfile(editId) : null;
  const selAvatar = existing?.avatar || AVATAR_OPTIONS[0];

  const html = `
    <div class="modal-title">${existing ? 'Edit Profile' : 'Create Profile'}</div>
    <div class="form-group">
      <label class="form-label">Avatar</label>
      <div class="emoji-grid" id="emojiGrid">
        ${AVATAR_OPTIONS.map(e=>`<button class="emoji-opt ${e===selAvatar?'selected':''}" data-emoji="${e}">${e}</button>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="profileName" type="text" placeholder="Full name" value="${existing?.name||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-select" id="profileRole">
        ${ROLES.map(r=>`<option ${existing?.role===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Join Date</label>
      <input class="form-input" id="profileJoin" type="date" value="${existing?.joinDate||new Date().toISOString().slice(0,10)}">
    </div>
    <div class="modal-footer">
      ${existing ? `<button class="btn-danger" id="deleteProfileBtn">Delete</button>` : ''}
      <button class="btn-cancel" id="cancelProfileBtn">Cancel</button>
      <button class="btn-submit" id="submitProfileBtn">${existing ? 'Save Changes' : 'Create Profile'}</button>
    </div>`;

  openModal(html);

  let chosenAvatar = selAvatar;
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      chosenAvatar = el.dataset.emoji;
    });
  });

  document.getElementById('cancelProfileBtn').addEventListener('click', closeModal);
  document.getElementById('submitProfileBtn').addEventListener('click', () => {
    const name = document.getElementById('profileName').value.trim();
    if (!name) { alert('Please enter a name.'); return; }
    const role = document.getElementById('profileRole').value;
    const joinDate = document.getElementById('profileJoin').value;
    if (existing) {
      existing.avatar = chosenAvatar;
      existing.name = name;
      existing.role = role;
      existing.joinDate = joinDate;
    } else {
      const newP = { id: genId(), name, role, avatar: chosenAvatar, joinDate, earnedIds: [] };
      data.profiles.push(newP);
      if (!data.activeProfileId) data.activeProfileId = newP.id;
    }
    save();
    closeModal();
    renderAll();
  });

  if (existing) {
    document.getElementById('deleteProfileBtn').addEventListener('click', () => {
      if (confirm(`Delete "${existing.name}"? This cannot be undone.`)) {
        data.profiles = data.profiles.filter(p => p.id !== existing.id);
        if (data.activeProfileId === existing.id) data.activeProfileId = data.profiles[0]?.id || null;
        if (catalogViewProfileId === existing.id) catalogViewProfileId = data.activeProfileId;
        save();
        closeModal();
        renderAll();
      }
    });
  }
}

// ── IMPORT / EXPORT ───────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dc-hub-backup.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported successfully');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.profiles || !Array.isArray(imported.profiles)) throw new Error('Invalid format');
      if (confirm(`Import data? This will replace all current profiles (${data.profiles.length} profiles will be overwritten).`)) {
        data = imported;
        save();
        renderAll();
        showToast('Data imported successfully');
      }
    } catch(err) {
      alert('Failed to import: invalid JSON format.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── TEAM OVERVIEW ─────────────────────────────────────────────────────────────
function renderTeamOverview() {
  const wrap = document.getElementById('teamContent');
  if (!data.profiles.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">👥</div><div class="empty-state-text">No profiles yet. Add team members in Manage Team.</div></div>';
    return;
  }

  const sorted = [...data.profiles].sort((a,b) => calcXP(b.earnedIds) - calcXP(a.earnedIds));
  const maxXp  = Math.max(...sorted.map(p => calcXP(p.earnedIds)), 1);
  const barColors = ['#007aff','#34c759','#ff9f0a','#af52de','#ff2d55','#32ade6','#5856d6','#b8860b'];
  const rankEmoji = i => ['👑','🥈','🥉'][i] || `#${i+1}`;

  const xpRows = sorted.map((p,i) => {
    const xp = calcXP(p.earnedIds);
    const pct = xp / maxXp * 100;
    return `<div class="team-xp-row">
      <div class="team-xp-avatar">${p.avatar}</div>
      <div class="team-xp-name">${p.name}</div>
      <div class="team-xp-bar-wrap">
        <div class="team-xp-bar-fill xp-anim-bar" style="width:0%;background:${barColors[i%barColors.length]}" data-pct="${pct}"></div>
      </div>
      <div class="team-xp-label">${xp.toLocaleString()} XP · ${p.earnedIds.length} ach</div>
    </div>`;
  }).join('');

  const cards = sorted.map((p,i) => {
    const xp  = calcXP(p.earnedIds);
    const lvl = getLevel(xp);
    const prog = xpProgress(xp);
    const stats = catStats(p);
    const isCurrent = p.id === data.activeProfileId;
    const totalAch = ACHIEVEMENTS.length;
    const pctDone = Math.round(p.earnedIds.length / totalAch * 100);

    const catRows = CATEGORIES.map(c => {
      const s = stats[c.id];
      return `<div class="tmc-cat-row">
        <div class="tmc-cat-icon">${c.icon}</div>
        <div class="tmc-cat-bar-wrap"><div class="tmc-cat-bar-fill tmc-bar-anim" style="width:0%" data-pct="${s.pct*100}"></div></div>
        <div class="tmc-cat-pct">${Math.round(s.pct*100)}%</div>
      </div>`;
    }).join('');

    return `<div class="tmc ${isCurrent?'is-current':''}" data-pid="${p.id}">
      <div class="tmc-top">
        <div class="tmc-avatar">${p.avatar}</div>
        <div class="tmc-info">
          <div class="tmc-name">${p.name}</div>
          <div class="tmc-role">${p.role||'Data Consultant'}</div>
          <div class="tmc-level">Lv.${lvl.lvl} · ${lvl.title}</div>
        </div>
        <div class="tmc-rank-badge">${rankEmoji(i)}</div>
      </div>
      <div class="tmc-stats">
        <div class="tmc-stat"><div class="tmc-stat-val">${xp.toLocaleString()}</div><div class="tmc-stat-lbl">XP</div></div>
        <div class="tmc-stat"><div class="tmc-stat-val">${p.earnedIds.length}</div><div class="tmc-stat-lbl">Earned</div></div>
        <div class="tmc-stat"><div class="tmc-stat-val">${pctDone}%</div><div class="tmc-stat-lbl">Complete</div></div>
      </div>
      <div class="tmc-cats">${catRows}</div>
      <div class="tmc-footer"><button class="tmc-view-btn" data-pid="${p.id}">View Dashboard →</button></div>
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="team-wrap">
    <div class="team-page-header">
      <div class="team-page-title">Team Overview</div>
      <div class="team-page-sub">${sorted.length} member${sorted.length!==1?'s':''} · ${ACHIEVEMENTS.length} achievements available</div>
    </div>
    <div class="team-top-bar">
      <div class="team-bar-title">XP Leaderboard</div>
      ${xpRows}
    </div>
    <div class="team-cards-grid">${cards}</div>
  </div>`;

  // Animate bars
  setTimeout(() => {
    wrap.querySelectorAll('.xp-anim-bar').forEach(el => { el.style.width = el.dataset.pct + '%'; });
    wrap.querySelectorAll('.tmc-bar-anim').forEach(el  => { el.style.width = el.dataset.pct + '%'; });
  }, 60);

  // View dashboard clicks
  wrap.querySelectorAll('.tmc-view-btn').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      data.activeProfileId = el.dataset.pid;
      save();
      showPage('dashboard');
      renderSidebar();
    });
  });
  wrap.querySelectorAll('.tmc').forEach(el => {
    el.addEventListener('click', () => {
      data.activeProfileId = el.dataset.pid;
      save();
      showPage('dashboard');
      renderSidebar();
    });
  });
}

// ── EXPORT / SYNC ─────────────────────────────────────────────────────────────
function exportMyProfile() {
  const p = activeProfile();
  if (!p) { showToast('No active profile to export'); return; }
  const payload = { type: 'dc-profile-sync', version: 1, profile: JSON.parse(JSON.stringify(p)) };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dc-profile-${p.name.replace(/\s+/g,'-').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${p.avatar} ${p.name}'s profile exported`);
}

function importProfileSync(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      // Single profile sync
      if (payload.type === 'dc-profile-sync' && payload.profile) {
        const incoming = payload.profile;
        const existing = data.profiles.find(p => p.id === incoming.id);
        if (existing) {
          // Merge: union of earned IDs
          const merged = [...new Set([...existing.earnedIds, ...incoming.earnedIds])];
          const added  = merged.length - existing.earnedIds.length;
          existing.earnedIds = merged;
          save();
          renderAll();
          showToast(`${existing.avatar} ${existing.name} synced — ${added} new achievement${added!==1?'s':''} added`);
        } else {
          if (confirm(`"${incoming.name}" not found in your team. Add them as a new member?`)) {
            data.profiles.push(incoming);
            data.activeProfileId = data.activeProfileId || incoming.id;
            save();
            renderAll();
            showToast(`${incoming.avatar} ${incoming.name} added to the team`);
          }
        }
      } else if (payload.profiles && Array.isArray(payload.profiles)) {
        // Full team backup (legacy import)
        if (confirm(`Import full team backup? This will replace all current profiles.`)) {
          data = payload;
          save();
          renderAll();
          showToast('Team data imported');
        }
      } else {
        throw new Error('Unknown format');
      }
    } catch(err) {
      alert('Failed to import: invalid file format.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

  else if (currentPage === 'leaderboard') renderLeaderboard();

}
