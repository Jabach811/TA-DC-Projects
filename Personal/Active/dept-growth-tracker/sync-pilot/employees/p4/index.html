const RARITY_STAR_COLORS = {common:'#8e8e93',uncommon:'#30d158',rare:'#409cff',epic:'#d48fff',legendary:'#ffd60a'};
const RARITY_STAR_COUNTS = {common:1,uncommon:2,rare:3,epic:4,legendary:5};
function rarityStars(rarity) {
  const n = RARITY_STAR_COUNTS[rarity] || 1;
  const c = RARITY_STAR_COLORS[rarity] || '#8e8e93';
  return Array(5).fill(0).map((_,i) =>
    `<i class="fa-solid fa-star" style="font-size:9px;color:${i<n?c:'rgba(255,255,255,.14)'}"></i>`
  ).join('');
}

function renderAchievementCard(achievement, profile) {
  const earnedIds = getEarnedIds(profile);
  const isEarned = earnedIds.includes(achievement.id);
  const tier = getAchievementTier(achievement.rarity);
  const tierLabel = tier === 'rookie' ? 'Rookie' : tier === 'pro' ? 'Pro' : 'Expert';
  const tierBg = tier==='rookie'?'rgba(48,209,88,.14)':tier==='pro'?'rgba(10,132,255,.14)':'rgba(191,90,242,.14)';
  const tierColor = tier==='rookie'?'#30d158':tier==='pro'?'#409cff':'#d48fff';
  const xp = ACH_XP_MAP[achievement.rarity];
  const cardState = isEarned ? 'earned' : 'locked';

  let stateLabel, stateClass, stateIcon;
  if (isEarned) { stateLabel='Earned'; stateClass='earned'; stateIcon=faIcon('fa-circle-check'); }
  else          { stateLabel='Award';  stateClass='action'; stateIcon=faIcon('fa-gift'); }

  return `<article class="ach-card2 ach-r-${achievement.rarity} ${cardState}" data-achievement-id="${achievement.id}">
    <div class="ach-topbar"></div>
    <div class="ach-card-icon-wrap">
      <div class="ach-card-icon-bg">
        ${faIcon(achievement.icon,'ach-card-icon-fa')}
        ${isEarned?`<div class="ach-earned-check">${faIcon('fa-check')}</div>`:''}
      </div>
    </div>
    <div class="ach-card-body">
      <div class="ach-card-head">
        <div class="ach-rarity-stars">${rarityStars(achievement.rarity)}</div>
        <div class="ach-card-state ${stateClass}">${stateIcon} ${stateLabel}</div>
      </div>
      <div class="ach-card-name">${achievement.name}</div>
      <div class="ach-card-desc">${achievement.desc}</div>
      ${!isEarned?`<div class="ach-card-hint">${achievement.hint}</div>`:''}
      <div class="ach-card-footer">
        <span class="ach-xp-badge">${faIcon('fa-bolt')} +${xp} XP</span>
        <span class="ach-tier-pill" style="background:${tierBg};color:${tierColor}">${tierLabel}</span>
      </div>
    </div>
  </article>`;
}

function renderQuests() {
  const page = document.getElementById('page-quests');
  if (!state.profiles.length) {
    page.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${faIcon('fa-trophy')}</div><div class="empty-state-title">No team members yet</div><div class="empty-state-text">Add team members in Manage Team before tracking achievements.</div><button class="btn btn-primary" onclick="showPage('manage')">Manage Team</button></div>`;
    return;
  }

  state.profiles.forEach(ensureProfileDefaults);
  let profile = state.appMode === 'manager'
    ? (getProfile(achievementViewProfileId) || getActiveProfile() || state.profiles[0])
    : getActiveProfile();
  if (!profile) profile = state.profiles[0];
  if (!profile) return;
  achievementViewProfileId = profile.id;

  let filtered = [...ACHIEVEMENTS];
  const earnedIds = getEarnedIds(profile);
  if (achievementFilters.status === 'earned') filtered = filtered.filter(item=>earnedIds.includes(item.id));
  if (achievementFilters.status === 'locked') filtered = filtered.filter(item=>!earnedIds.includes(item.id));
  if (achievementFilters.cat !== 'all') filtered = filtered.filter(item=>item.cat===achievementFilters.cat);
  if (achievementFilters.tier !== 'all') filtered = filtered.filter(item=>getAchievementTier(item.rarity)===achievementFilters.tier);

  const xp = calcAchievementXP(profile);
  const level = getAchievementLevel(xp);
  const next = getNextAchievementLevel(xp);
  const progress = getAchievementProgress(xp);
  const earnedAchievements = ACHIEVEMENTS.filter(item=>earnedIds.includes(item.id));

  // â”€â”€ INDIVIDUAL MODE: gallery of earned achievements â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  if (state.appMode === 'individual') {
    const featuredIds = profile.featuredIds || [];
    const rarityOrder = {legendary:0,epic:1,rare:2,uncommon:3,common:4};
    const sorted = [...earnedAchievements].sort((a,b)=>{
      const af = featuredIds.includes(a.id)?0:1, bf = featuredIds.includes(b.id)?0:1;
      if (af!==bf) return af-bf;
      return (rarityOrder[a.rarity]||4)-(rarityOrder[b.rarity]||4);
    });

    const heroHtml = `
      <section class="ach-hero">
        <div class="ach-hero-top">
          <div>
            <div class="ach-kicker">My Achievements</div>
            <div class="ach-title">Your earned badges and milestones.</div>
            <div class="ach-copy">These are the achievements your manager has awarded you. Star your favorites to pin them to your dashboard showcase.</div>
          </div>
          <div class="ach-profile-panel">
            <div class="ach-profile-label">Your Progress</div>
            <div class="ach-profile-name">${faIcon(level.icon)} Level ${level.lvl}</div>
            <div class="ach-profile-role">${level.title}</div>
            <div class="ach-profile-meta">${earnedIds.length} earned | ${xp.toLocaleString()} XP${next?` | ${(next.xp-xp).toLocaleString()} to Lvl ${next.lvl}` : ' | Max level'}</div>
          </div>
        </div>
        <div class="ach-progress-row">
          <div class="ach-progress-bar"><div class="ach-progress-fill" style="width:${progress*100}%"></div></div>
          <div class="ach-progress-text">${xp.toLocaleString()} XP${next?` | ${(next.xp-xp).toLocaleString()} to Level ${next.lvl}`:' | Top level reached'}</div>
        </div>
      </section>`;

    if (!sorted.length) {
      page.innerHTML = heroHtml + `<div class="ach-gallery-empty"><div class="ach-gallery-empty-icon">${faIcon('fa-trophy')}</div><div class="ach-gallery-empty-title">No achievements yet</div><p>Your manager will award achievements as you hit milestones.<br>They'll show up here when earned.</p></div>`;
      return;
    }

    const featuredCards = sorted.filter(a=>featuredIds.includes(a.id));
    const restCards = sorted.filter(a=>!featuredIds.includes(a.id));

    const buildGalleryCard = (a) => {
      const isFeat = featuredIds.includes(a.id);
      const t = getAchievementTier(a.rarity);
      const tLabel = t==='rookie'?'Rookie':t==='pro'?'Pro':'Expert';
      const tBg = t==='rookie'?'rgba(48,209,88,.14)':t==='pro'?'rgba(10,132,255,.14)':'rgba(191,90,242,.14)';
      const tColor = t==='rookie'?'#30d158':t==='pro'?'#409cff':'#d48fff';
      return `<article class="ach-card2 ach-r-${a.rarity} earned">
        <div class="ach-topbar"></div>
        <button class="ach-feature-btn ${isFeat?'featured':''}" data-feature-id="${a.id}" title="${isFeat?'Remove from showcase':'Pin to showcase'}">${faIcon('fa-star')}</button>
        <div class="ach-card-icon-wrap">
          <div class="ach-card-icon-bg">
            ${faIcon(a.icon,'ach-card-icon-fa')}
            <div class="ach-earned-check">${faIcon('fa-check')}</div>
          </div>
        </div>
        <div class="ach-card-body">
          <div class="ach-card-head">
            <div class="ach-rarity-stars">${rarityStars(a.rarity)}</div>
            <div class="ach-card-state earned">${faIcon('fa-circle-check')} Earned</div>
          </div>
          <div class="ach-card-name">${a.name}</div>
          <div class="ach-card-desc">${a.desc}</div>
          <div class="ach-card-footer">
            <span class="ach-xp-badge">${faIcon('fa-bolt')} +${ACH_XP_MAP[a.rarity]} XP</span>
            <span class="ach-tier-pill" style="background:${tBg};color:${tColor}">${tLabel}</span>
          </div>
        </div>
      </article>`;
    };

    let galleryHtml = '';
    if (featuredCards.length) {
      galleryHtml += `<div class="ach-gallery-section"><div class="ach-gallery-section-label">${faIcon('fa-star')} Pinned to showcase (${featuredCards.length})</div><div class="ach-grid">${featuredCards.map(buildGalleryCard).join('')}</div></div>`;
    }
    if (restCards.length) {
      galleryHtml += `<div class="ach-gallery-section"><div class="ach-gallery-section-label">${faIcon('fa-trophy')} All earned (${restCards.length})</div><div class="ach-grid">${restCards.map(buildGalleryCard).join('')}</div></div>`;
    }

    page.innerHTML = `<div class="ach-shell">${heroHtml}${galleryHtml}</div>`;

    page.querySelectorAll('[data-feature-id]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        toggleFeature(profile.id, el.dataset.featureId);
      });
    });
    return;
  }

  // â”€â”€ MANAGER MODE: full award grid â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  const rank = getAchievementRank(profile.id);
  const stats = getAchievementCategoryStats(profile);
  const topCat = ACH_CATEGORIES.map(cat=>({cat,pct:stats[cat.id].pct})).sort((a,b)=>b.pct-a.pct)[0];
  const trophyCase = earnedAchievements.length
    ? `<div class="ach-trophy-grid">${earnedAchievements.map(item=>`<div class="ach-trophy-card ach-r-${item.rarity}"><div class="ach-trophy-icon">${faIcon(item.icon)}</div><div class="ach-trophy-name">${item.name}</div><div class="ach-trophy-meta"><span class="ach-trophy-rarity">${item.rarity}</span><span class="ach-trophy-xp">+${ACH_XP_MAP[item.rarity]} XP</span></div></div>`).join('')}</div>`
    : `<div class="ach-trophy-empty">No earned achievements yet. Click any locked card below to award it.</div>`;

  const profileSelect = `
    <select class="ach-profile-select" id="achievementProfileSelect">
      ${state.profiles.map(p=>`<option value="${p.id}" ${p.id===profile.id?'selected':''}>${p.name} | ${p.role}</option>`).join('')}
    </select>`;

  const sections = ACH_CATEGORIES.map(cat => {
    const catItems = filtered.filter(item=>item.cat===cat.id);
    if (!catItems.length) return '';
    const totalInCat = ACHIEVEMENTS.filter(item=>item.cat===cat.id).length;
    const earnedInCat = catItems.filter(item=>earnedIds.includes(item.id)).length;
    const tierBlocks = ACH_TIERS.map(tier => {
      const items = catItems.filter(item=>tier.rarities.includes(item.rarity));
      if (!items.length) return '';
      const earned = items.filter(item=>earnedIds.includes(item.id)).length;
      return `<div class="ach-tier-block">
        <div class="ach-tier-head" style="background:${tier.bg}">
          <div class="ach-tier-dot" style="background:${tier.color}"></div>
          <div class="ach-tier-title" style="color:${tier.color}">${tier.label}</div>
          <div class="ach-tier-desc">${tier.desc}</div>
          <div class="ach-tier-count" style="color:${tier.color}">${earned}/${items.length}</div>
        </div>
        <div class="ach-grid">${items.map(item=>renderAchievementCard(item, profile)).join('')}</div>
      </div>`;
    }).join('');
    return `<section class="ach-section">
      <div class="ach-section-header">
        <div class="ach-section-icon">${faIcon(cat.icon)}</div>
        <div class="ach-section-title">${cat.title}</div>
        <div class="ach-section-meta">${earnedInCat}/${totalInCat} earned</div>
      </div>
      ${tierBlocks}
    </section>`;
  }).join('');

  page.innerHTML = `
    <div class="ach-shell">
      <section class="ach-hero">
        <div class="ach-hero-top">
          <div>
            <div class="ach-kicker">Milestones & Momentum</div>
            <div class="ach-title">Award achievements to the team.</div>
            <div class="ach-copy">Click any locked card to award it. Click an earned card to remove it. Awarded achievements appear in the individual's gallery and on their dashboard.</div>
          </div>
          <div class="ach-profile-panel">
            <div class="ach-profile-label">Currently Viewing</div>
            <div class="ach-profile-name">${profile.name}</div>
            <div class="ach-profile-role">${profile.role}</div>
            <div class="ach-profile-meta">${faIcon(level.icon)} Level ${level.lvl} | ${level.title}<br>${earnedIds.length} of ${ACHIEVEMENTS.length} earned | #${rank} team rank</div>
          </div>
        </div>
        <div class="ach-progress-row">
          <div class="ach-progress-bar"><div class="ach-progress-fill" style="width:${progress*100}%"></div></div>
          <div class="ach-progress-text">${xp.toLocaleString()} XP${next?` | ${(next.xp-xp).toLocaleString()} to Level ${next.lvl}`:' | Top level reached'}</div>
        </div>
      </section>

      <section class="ach-trophy-case">
        <div class="ach-trophy-head">
          <div class="ach-trophy-title">${faIcon('fa-trophy')} Trophy Case</div>
          <div class="ach-trophy-sub">${earnedIds.length} earned | ${xp.toLocaleString()} XP${topCat?` | strongest: ${topCat.cat.title}`:''}</div>
        </div>
        ${trophyCase}
      </section>

      <div class="ach-controls">
        ${profileSelect}
        <div class="ach-chip-row">
          <button class="ach-chip ${achievementFilters.status==='all'?'active':''}" data-status="all">All</button>
          <button class="ach-chip ${achievementFilters.status==='earned'?'active':''}" data-status="earned">Earned</button>
          <button class="ach-chip ${achievementFilters.status==='locked'?'active':''}" data-status="locked">Locked</button>
        </div>
        <div class="ach-chip-row">
          <button class="ach-chip ${achievementFilters.tier==='all'?'active':''}" data-tier="all">All Tiers</button>
          <button class="ach-chip tier-rookie ${achievementFilters.tier==='rookie'?'active':''}" data-tier="rookie">Rookie</button>
          <button class="ach-chip tier-pro ${achievementFilters.tier==='pro'?'active':''}" data-tier="pro">Pro</button>
          <button class="ach-chip tier-expert ${achievementFilters.tier==='expert'?'active':''}" data-tier="expert">Expert</button>
        </div>
        <div class="ach-chip-row">
          <button class="ach-chip ${achievementFilters.cat==='all'?'active':''}" data-cat="all">All Categories</button>
          ${ACH_CATEGORIES.map(cat=>`<button class="ach-chip ${achievementFilters.cat===cat.id?'active':''}" data-cat="${cat.id}">${faIcon(cat.icon)} ${cat.title}</button>`).join('')}
        </div>
      </div>

      ${sections || `<div class="empty-state"><div class="empty-state-icon">${faIcon('fa-magnifying-glass')}</div><div class="empty-state-title">No achievements match this filter</div><div class="empty-state-text">Try a different status, tier, or category.</div></div>`}
    </div>
  `;

  document.getElementById('achievementProfileSelect')?.addEventListener('change', e => {
    achievementViewProfileId = e.target.value;
    renderQuests();
  });
  page.querySelectorAll('[data-status]').forEach(el => {
    el.addEventListener('click', () => { achievementFilters.status = el.dataset.status; renderQuests(); });
  });
  page.querySelectorAll('[data-tier]').forEach(el => {
    el.addEventListener('click', () => { achievementFilters.tier = el.dataset.tier; renderQuests(); });
  });
  page.querySelectorAll('[data-cat]').forEach(el => {
    el.addEventListener('click', () => { achievementFilters.cat = el.dataset.cat; renderQuests(); });
  });
  page.querySelectorAll('[data-achievement-id]').forEach(el => {
    el.addEventListener('click', () => {
      const achievementId = el.dataset.achievementId;
      if (earnedIds.includes(achievementId)) {
        if (confirm('Remove this achievement from the selected profile?')) removeAchievement(profile.id, achievementId);
      } else {
        awardAchievement(profile.id, achievementId);
      }
    });
  });
}

function openCompDetail(compId, profileId) {
  const comp = getComp(compId);
  if (!comp) return;
  const cat = getCat(comp.cat);
  const pid = profileId || state.activeProfileId;
  const profile = pid ? getProfile(pid) : null;
  const rating = profile ? getRating(profile,compId) : -1;
  const target = profile ? getTarget(profile,compId) : (comp.core?3:2);
  const dueDate = profile?.targetDates?.[compId] || null;
  const dueDateDisplay = dueDate
    ? `<span style="font-size:12px;color:var(--text-secondary)">${faIcon('fa-calendar-day')} Due <strong>${new Date(dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</strong></span>`
    : `<span style="font-size:12px;color:var(--text-tertiary)">No due date set</span>`;

  document.getElementById('modal-header').innerHTML = `
    <span style="font-size:18px">${cat?faIcon(cat.icon):''}</span>
    <div style="flex:1">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">${comp.title}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${comp.core?`<span class="badge badge-core">Core</span>`:''}
        ${priorityBadge(comp.priority)}
        <span class="badge" style="background:rgba(0,0,0,0.05);color:var(--text-secondary)">${comp.term} term</span>
        <span style="font-size:12px;color:var(--text-secondary)">Target: <strong>${LEVELS[target].label}</strong></span>
        ${profile?dueDateDisplay:''}
      </div>
    </div>
    ${profile?`<span class="badge-level ${levelClass(rating>=0?rating:0)}" style="font-size:12px;padding:4px 10px;border-radius:7px;font-weight:700;border:1px solid">${rating>=0?LEVELS[rating].short:'N/A'}</span>`:''}
  `;

  const levelDefs = comp.levelDesc.map((d,i)=>`
    <div class="level-def-row ${i===rating?'current':''}">
      <span class="level-def-badge ${levelClass(i)}">${i} - ${LEVELS[i].short}</span>
      <span class="level-def-text">${d}</span>
    </div>
  `).join('');

  const ratingBtns = profile ? `
    <div class="modal-section">
      <div class="modal-section-label">Your Rating</div>
      <div class="modal-rating-row">
        ${LEVELS.map(lv=>`<button class="modal-rate-btn ${lv.id===rating?'active':''}" style="color:${lv.color};border-color:${lv.border};background:${lv.id===rating?lv.bg:'transparent'}" onclick="setRatingModal('${pid}','${compId}',${lv.id})">${lv.id} - ${lv.label}</button>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Description</div>
      <div class="modal-section-text">${comp.desc}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Why It Matters</div>
      <div class="modal-section-text">${comp.why}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">How to Develop</div>
      <div class="modal-section-text">${comp.how}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Proficiency Levels</div>
      <div class="level-defs">${levelDefs}</div>
    </div>
    ${ratingBtns}
  `;

  document.getElementById('modal-overlay').classList.add('visible');
}

window.setRatingModal = function(profileId, compId, level) {
  const profile = getProfile(profileId);
  if (!profile) return;
  if (!profile.ratings) profile.ratings = {};
  profile.ratings[compId] = level;
  saveState();
  openCompDetail(compId, profileId);
  if (currentPage==='dashboard') renderDashboard();
  if (currentPage==='matrix') renderMatrix();
  if (currentPage==='quests') renderQuests();
};

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('visible');
}

function buildEmployeeSyncPayload(profile) {
  return {
    type:'dc-growth-employee-sync',
    version:1,
    exportedAt: new Date().toISOString(),
    profileId: profile.id,
    profile: JSON.parse(JSON.stringify(profile)),
  };
}

    const data = buildEmployeeSyncPayload(profile);
    downloadJSON(data, `dc-growth-sync-${profile.id}.json`);
  });
};

window.publishEmployeeSyncFilesToFolder = async function() {
  if (!window.showDirectoryPicker) {
    alert('Direct folder publishing is not supported in this browser. Use Export Employee Sync Files instead.');
    return;
  }
  try {
    const root = await window.showDirectoryPicker({ mode:'readwrite' });
    let subfolderMatches = 0;
    for (const profile of state.profiles) {
      try {
        await root.getDirectoryHandle(profile.id, { create:false });
        subfolderMatches++;
      } catch (err) {}
    }

    // Bulk mode: selected folder has p1/p2/... subfolders
    if (subfolderMatches > 0) {
      let writes = 0;
      let misses = 0;
      for (const profile of state.profiles) {
        const payload = buildEmployeeSyncPayload(profile);
        const content = JSON.stringify(payload, null, 2);
        try {
          const employeeDir = await root.getDirectoryHandle(profile.id, { create:false });
          const file = await employeeDir.getFileHandle('update.json', { create:true });
          const writable = await file.createWritable();
          await writable.write(content);
          await writable.close();
          writes++;
        } catch (err) {
          misses++;
        }
      }
      alert(misses ? `Published ${writes} employee update.json files. ${misses} folders were missing.` : `Published ${writes} employee update.json files.`);
      return;
    }

    // Single-folder mode: selected folder is one employee folder.
    let targetProfile = state.profiles.find(p=>p.id===root.name) || null;
    if (!targetProfile && state.activeProfileId) {
      targetProfile = state.profiles.find(p=>p.id===state.activeProfileId) || null;
    }
    if (!targetProfile) {
      alert('Could not determine which employee folder was selected. Use a folder named with profile id (for example p4), or open that profile first and retry.');
      return;
    }

    const payload = buildEmployeeSyncPayload(targetProfile);
    const content = JSON.stringify(payload, null, 2);
    const file = await root.getFileHandle('update.json', { create:true });
    const writable = await file.createWritable();
    await writable.write(content);
    await writable.close();
    alert(`Published update.json for ${targetProfile.name}.`);
  } catch (err) {
    if (err && err.name === 'AbortError') return;
    alert('Could not publish sync files to folder.');
  }
};

window.handleEmployeeSyncFile = function(evt) {
  const file = evt.target.files && evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const expectedId = APP_SYNC.employeeProfileId || data.profileId || data.employeeProfileId || data.profile?.id || null;
      const incoming = extractProfileFromSyncPayload(data, expectedId);
      if (!incoming) throw new Error('Profile mismatch');
      const current = state.profiles.find(p=>p.id===incoming.id) || null;
      const beforeEarned = new Set((current?.earnedIds || []));
      const newlyEarned = (incoming.earnedIds || []).filter(id => !beforeEarned.has(id));
      if (!APP_SYNC.employeeProfileId) APP_SYNC.employeeProfileId = incoming.id;
      state.profiles = [incoming];
      state.activeProfileId = incoming.id;
      state.appMode = 'individual';
      saveState();
      renderPage(currentPage);
      renderSidebar();
      if (newlyEarned.length) {
        showSyncToast(newlyEarned.length === 1 ? 'NEW ACHIEVEMENT UNLOCKED!' : `${newlyEarned.length} NEW ACHIEVEMENTS UNLOCKED!`);
      } else {
        showSyncToast('Profile updated from local update.json.');
      }
    } catch (err) {
      alert('Could not apply this update file. Make sure it is a valid employee sync JSON for this profile.');
    }
    evt.target.value = '';
  };
  reader.readAsText(file);
};

window.handleImport = function(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type==='dc-growth-employee-sync') {
        const expectedId = APP_SYNC.role === 'employee' ? APP_SYNC.employeeProfileId : null;
        const incoming = extractProfileFromSyncPayload(data, expectedId || data.profileId || data.profile?.id);
        if (!incoming) throw new Error('Profile mismatch');
        const idx = state.profiles.findIndex(p=>p.id===incoming.id);
        if (idx >= 0) state.profiles[idx] = incoming;
        else state.profiles.push(incoming);
        state.activeProfileId = incoming.id;
        alert(`Synced profile for ${incoming.name}.`);
      } else if (data.type==='dc-growth-sync') {
        // Merge single profile
        const incoming = ensureProfileDefaults(data.profile || {});
        const existing = getProfile(incoming.id);
        if (existing) {
          ensureProfileDefaults(existing);
          // Merge ratings (take higher)
          Object.entries(incoming.ratings||{}).forEach(([k,v])=>{
            existing.ratings[k] = Math.max(existing.ratings[k]||0, v);
          });
          existing.earnedIds = [...new Set([...(existing.earnedIds||[]), ...(incoming.earnedIds||[])])];
          alert(`Updated ratings for ${incoming.name}.`);
        } else {
          state.profiles.push(incoming);
          alert(`Added profile: ${incoming.name}.`);
        }
      } else if (data.type==='dc-growth-backup') {
        if (confirm('This will replace all team data. Continue?')) {
          state.profiles = (data.profiles||[]).map(ensureProfileDefaults);
          state.activeProfileId = data.activeProfileId||null;
          state.appMode = data.appMode||'manager';
        }
      }
      enforceEmployeeScope();
      saveState();
      renderPage(currentPage);
      renderSidebar();
    } catch(err) { alert('Invalid file.'); }
    evt.target.value='';
  };
  reader.readAsText(file);
};

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

window.openProfileSwitcher = function() {
  if (!state.profiles.length) { showPage('manage'); return; }
  // Build a quick picker
  const existing = document.getElementById('profile-switcher-popup');
  if (existing) { existing.remove(); return; }
  const popup = document.createElement('div');
  popup.id = 'profile-switcher-popup';
  popup.style.cssText='position:fixed;bottom:70px;left:10px;width:220px;background:#2c2c2e;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:999;padding:8px;border:1px solid rgba(255,255,255,0.1)';
  popup.innerHTML = state.profiles.map(p=>`
    <div onclick="switchProfile('${p.id}')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:#fff;transition:background .12s;background:${p.id===state.activeProfileId?'rgba(255,255,255,0.12)':'transparent'}">
      ${profileAvatar(p, 28, 6)}
      <div><div style="font-size:12px;font-weight:500">${p.name}</div><div style="font-size:10px;color:rgba(255,255,255,0.5)">${p.role}</div></div>
    </div>
  `).join('');
  document.body.appendChild(popup);
  setTimeout(()=>{ document.addEventListener('click',()=>popup.remove(),{once:true}); },50);
};

window.switchProfile = function(id) {
  state.activeProfileId = id;
  saveState();
  renderSidebar();
  if (currentPage==='dashboard'||currentPage==='library'||currentPage==='quests') renderPage(currentPage);
  document.getElementById('profile-switcher-popup')?.remove();
};
