function renderLibrary() {
  const page = document.getElementById('page-library');
  let activeCat = page._activeCat || 'all';

  const filterBar = `<div id="lib-filter-bar">
    <span class="filter-chip ${activeCat==='all'?'active':''}" onclick="libFilter('all')">All</span>
    ${CATEGORIES.map(c=>`<span class="filter-chip ${activeCat===c.id?'active':''}" onclick="libFilter('${c.id}')">${c.icon} ${c.title}</span>`).join('')}
  </div>`;

  const profile = getActiveProfile();
  let comps = activeCat==='all' ? COMPETENCIES : COMPETENCIES.filter(c=>c.cat===activeCat);

  const cards = comps.map(comp=>{
    const cat = getCat(comp.cat);
    const rating = profile ? getRating(profile,comp.id) : 0;
    const lv = LEVELS[rating];
    return `<div class="lib-card" onclick="openCompDetail('${comp.id}')">
      <div class="lib-card-top">
        <span style="font-size:16px">${cat?cat.icon:''}</span>
        <span class="lib-card-title">${comp.title}</span>
        ${profile?`<span class="badge-level ${levelClass(rating)}" style="font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;border:1px solid">${lv.short}</span>`:''}
      </div>
      <div class="lib-card-desc">${comp.desc}</div>
      <div class="lib-card-meta">
        ${comp.core?`<span class="badge badge-core" style="font-size:10px">Core</span>`:''}
        ${priorityBadge(comp.priority)}
        <span class="badge" style="background:rgba(0,0,0,0.05);color:var(--text-secondary);font-size:10px">${comp.term}</span>
      </div>
    </div>`;
  }).join('');

  page.innerHTML = filterBar + `<div class="lib-grid">${cards}</div>`;
  page._activeCat = activeCat;
}

window.libFilter = function(cat) {
  const page = document.getElementById('page-library');
  page._activeCat = cat;
  renderLibrary();
};

  const tierLabel = tier === 'rookie' ? 'Rookie' : tier === 'pro' ? 'Pro' : 'Expert';
  return `<article class="ach-card2 ach-r-${achievement.rarity} ${isEarned?'earned':'locked'}" data-achievement-id="${achievement.id}">

function renderQuests() {
  const page = document.getElementById('page-quests');
  if (!state.profiles.length) {
    page.innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#127941;</div><div class="empty-state-title">No team members yet</div><div class="empty-state-text">Add team members in Manage Team before tracking achievements.</div><button class="btn btn-primary" onclick="showPage('manage')">Manage Team</button></div>`;
    return;
  }

  state.profiles.forEach(ensureProfileDefaults);
  let profile = state.appMode === 'manager'
    ? (getProfile(achievementViewProfileId) || getActiveProfile() || state.profiles[0])
    : getActiveProfile();
  if (!profile) profile = state.profiles[0];
  if (!profile) return;
  achievementViewProfileId = profile.id;

  let filtered = [...ACHIEVEMENTS];
  const earnedIds = getEarnedIds(profile);
  if (achievementFilters.status === 'earned') filtered = filtered.filter(item=>earnedIds.includes(item.id));
  if (achievementFilters.status === 'locked') filtered = filtered.filter(item=>!earnedIds.includes(item.id));
  if (achievementFilters.cat !== 'all') filtered = filtered.filter(item=>item.cat===achievementFilters.cat);
  if (achievementFilters.tier !== 'all') filtered = filtered.filter(item=>getAchievementTier(item.rarity)===achievementFilters.tier);

  const xp = calcAchievementXP(profile);
  const level = getAchievementLevel(xp);
  const next = getNextAchievementLevel(xp);
  const progress = getAchievementProgress(xp);
  const rank = getAchievementRank(profile.id);
  const stats = getAchievementCategoryStats(profile);
  const completion = Math.round((earnedIds.length / ACHIEVEMENTS.length) * 100);
  const teamEarned = state.profiles.reduce((sum,p)=>sum + getEarnedIds(p).length, 0);
  const topCat = ACH_CATEGORIES.map(cat=>({ cat, pct:stats[cat.id].pct })).sort((a,b)=>b.pct-a.pct)[0];
  const earnedAchievements = ACHIEVEMENTS.filter(item=>earnedIds.includes(item.id));

            <div class="ach-profile-name">${profile.name}</div>
            <div class="ach-profile-role">${profile.role}</div>

window.exportProfile = function(id) {

  if (!p) return;
  const data = {type:'dc-growth-sync',version:1,profile:JSON.parse(JSON.stringify(p))};
  downloadJSON(data, `dc-growth-${p.name.replace(/\s+/g,'-').toLowerCase()}.json`);
};

window.exportAll = function() {
  const data = {type:'dc-growth-backup',version:1,...JSON.parse(JSON.stringify(state))};
  downloadJSON(data,'dc-growth-team-backup.json');
};

window.importBackup = function() { triggerImport(); };
window.triggerImport = function() { document.getElementById('file-import').click(); };

window.handleImport = function(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type==='dc-growth-sync') {
        // Merge single profile
        const incoming = ensureProfileDefaults(data.profile || {});
        const existing = getProfile(incoming.id);
        if (existing) {
          ensureProfileDefaults(existing);
          // Merge ratings (take higher)
          Object.entries(incoming.ratings||{}).forEach(([k,v])=>{
            existing.ratings[k] = Math.max(existing.ratings[k]||0, v);
          });
          existing.earnedIds = [...new Set([...(existing.earnedIds||[]), ...(incoming.earnedIds||[])])];
          alert(`Updated ratings for ${incoming.name}.`);
        } else {
          state.profiles.push(incoming);
          alert(`Added profile: ${incoming.name}.`);
        }
      } else if (data.type==='dc-growth-backup') {
        if (confirm('This will replace all team data. Continue?')) {
          state.profiles = (data.profiles||[]).map(ensureProfileDefaults);
          state.activeProfileId = data.activeProfileId||null;
          state.appMode = data.appMode||'manager';
        }
      }
      saveState();
      renderPage(currentPage);
      renderSidebar();
    } catch(err) { alert('Invalid file.'); }
    evt.target.value='';
  };
  reader.readAsText(file);
};

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
